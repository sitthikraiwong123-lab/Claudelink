<style>
:root{--red:#d81f2a;--ink:#1a1a1a;--mute:#8a8f98;--line:#e3e6ea;--bg:#eef1f5;--white:#fff;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,"Noto Sans Thai",sans-serif;
  background:var(--bg);color:var(--ink);min-height:100dvh}
#launcher{min-height:100dvh;display:flex;flex-direction:column}
.hero{background:var(--white);border-bottom:2px solid var(--red);padding:24px 18px;padding-top:calc(24px + var(--safe-top));display:flex;align-items:center;gap:14px}
.hero .mark{width:56px;height:56px;border-radius:13px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--line)}
.hero .mark img{width:100%;height:100%;object-fit:cover}
.hero h1{font-size:19px;font-weight:800;letter-spacing:.2px}
.hero p{font-size:12px;color:var(--mute);font-weight:600;margin-top:2px}
.wrap{flex:1;max-width:720px;width:100%;margin:0 auto;padding:18px;padding-bottom:calc(30px + var(--safe-bot));display:grid;gap:14px;align-content:start}
.lbl{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--mute);margin:6px 2px 0}
.app-card{display:flex;align-items:center;gap:15px;background:var(--white);border:1px solid var(--line);border-radius:16px;padding:18px;text-decoration:none;color:inherit;box-shadow:0 4px 16px rgba(17,24,39,.05);transition:.14s;cursor:pointer;width:100%;text-align:left;font-family:inherit}
.app-card:active{transform:scale(.99)}
.app-card .ic{width:54px;height:54px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;background:linear-gradient(135deg,var(--red),#ff6a6a)}
.app-card .ic.b{background:linear-gradient(135deg,#1746a2,#3b82f6)}
.app-card .ttl{font-size:16px;font-weight:800}
.app-card .dsc{font-size:12.5px;color:var(--mute);font-weight:600;margin-top:3px;line-height:1.4}
.app-card .arr{margin-left:auto;color:var(--mute);font-size:22px}
.foot{text-align:center;font-size:11px;color:var(--mute);padding:14px;font-weight:600}
#appView{display:none;flex-direction:column;height:100dvh}
#topnav{height:46px;padding-top:var(--safe-top);box-sizing:content-box;background:#fff;border-bottom:2px solid var(--red);display:flex;align-items:center;gap:10px;padding-left:10px;padding-right:14px;flex-shrink:0}
#topnav .back{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--line);background:#fff;color:var(--ink);font-weight:800;font-size:13px;padding:8px 12px;border-radius:10px;cursor:pointer;font-family:inherit}
#topnav .nm{font-weight:800;font-size:14px}
#appFrame{flex:1;width:100%;border:none;display:block}
</style>
</head>

<html lang="th">
<head>
<meta charset="utf-8">

<title>Gasoline — Fix Cash Advance</title>
<style>
:root{
  --red:#d81f2a; --red-dk:#a8151f; --red-lt:#fde8e9;
  --ink:#1a1a1a; --mid:#555; --mute:#8a8f98; --line:#e3e6ea;
  --bg:#eef1f5; --white:#fff; --green:#16a34a; --amber:#d97706; --blue:#1a56db;
  --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,"Noto Sans Thai",sans-serif;
  background:var(--bg);color:var(--ink);min-height:100dvh;overscroll-behavior-y:none}
.topbar{background:var(--white);border-bottom:2px solid var(--red);padding:10px 14px;
  padding-top:calc(10px + var(--safe-top));display:flex;align-items:center;justify-content:space-between;
  gap:10px;position:sticky;top:0;z-index:200;box-shadow:0 1px 10px rgba(0,0,0,.06)}
.tb-left{display:flex;align-items:center;gap:11px;min-width:0}
.logo-mark{width:34px;height:34px;border-radius:8px;background:var(--white);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.logo-mark img{width:100%;height:100%;object-fit:contain}
.tb-title{font-size:15px;font-weight:800;letter-spacing:.2px;line-height:1.1;white-space:nowrap}
.tb-sub{font-size:11px;color:var(--mute);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:46vw}
.tb-right{display:flex;gap:6px;align-items:center;flex-wrap:nowrap;justify-content:flex-end}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;padding:9px 13px;border-radius:10px;
  font-size:13px;font-weight:700;cursor:pointer;transition:.12s;white-space:nowrap;font-family:inherit;-webkit-appearance:none}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.5;cursor:default}
.btn-red{background:var(--red);color:#fff}.btn-out{background:var(--white);color:var(--ink);border:1.5px solid var(--line)}
.btn-ghost{background:transparent;color:var(--mid);border:1.5px solid var(--line)}
.btn-grn{background:var(--green);color:#fff}.btn-blue{background:var(--blue);color:#fff}
.btn-sm{padding:7px 11px;font-size:12px}.btn-ico{width:34px;height:34px;padding:0;justify-content:center;font-size:16px}
.wrap{max-width:880px;margin:0 auto;padding:14px;padding-bottom:calc(40px + var(--safe-bot));display:grid;gap:14px}
.card{background:var(--white);border:1px solid var(--line);border-radius:14px;box-shadow:0 4px 16px rgba(17,24,39,.05);overflow:hidden}
.card-h{padding:13px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-h h3{font-size:13px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;color:var(--mid)}
.card-b{padding:14px}
.row{display:grid;gap:10px}.row.two{grid-template-columns:1fr 1fr}.row.three{grid-template-columns:1fr 1fr 1fr}
@media(max-width:540px){.row.three{grid-template-columns:1fr 1fr}}
label{font-size:11px;color:var(--mute);font-weight:700;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
input,select,textarea{width:100%;padding:10px 11px;border:1.5px solid var(--line);border-radius:10px;background:var(--white);
  font-size:14px;outline:none;font-family:inherit;color:var(--ink)}
input:focus,select:focus,textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-lt)}
textarea{min-height:54px;resize:vertical}
input[type=date],input[type=number]{text-align:left;-webkit-appearance:none;appearance:none}
.pill{display:inline-flex;gap:6px;align-items:center;padding:6px 11px;border-radius:999px;background:var(--red-lt);
  color:var(--red);font-weight:800;font-size:12px;white-space:nowrap}
.month-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.month-bar select{max-width:200px;font-weight:700}
.summary-line{display:grid;grid-template-columns:1fr 116px 110px;gap:8px;align-items:end;padding:8px 0;border-bottom:1px dashed var(--line)}
.summary-line:last-child{border-bottom:none}
.summary-line .sl-label{font-size:12px;font-weight:700;color:var(--ink);line-height:1.3}
.summary-line .sl-sub{font-size:10px;color:var(--mute);font-weight:600}
.summary-line input{padding:7px 9px;font-size:13px}
.summary-line .sl-ro{padding:7px 9px;font-size:12.5px;font-weight:700;background:#f4f6f8;border:1px solid var(--line);border-radius:8px;color:var(--ink)}
.summary-line .sl-amt{text-align:right;color:#1746a2}
.reimb-title{font-size:13.5px;font-weight:800;color:var(--ink);line-height:1.3}
.reimb-note{font-size:11px;color:var(--mute);font-weight:600;margin-top:3px}
.reimb-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.reimb-field{display:flex;flex-direction:column;gap:5px;min-width:0}
.reimb-lbl{font-size:10px;color:var(--mute);font-weight:700;letter-spacing:.3px}
.reimb-field input,.reimb-field .sl-ro{width:100%;box-sizing:border-box}
.reimb-field .sl-amt{padding:9px 10px;font-size:14px;text-align:right;color:#1746a2}
.entry{border:1px solid var(--line);border-radius:12px;padding:11px;background:var(--white);margin-bottom:10px}
.entry.has-rcpt{border-color:rgba(22,163,74,.4)}
.entry-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
.entry-top .et-no{font-size:12px;font-weight:800;color:var(--red)}
.entry-top .et-act{display:flex;gap:6px}
.entry-grid{display:grid;grid-template-columns:1fr 110px;gap:9px}
.entry-meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-top:9px}
@media(max-width:540px){.entry-meta{grid-template-columns:1fr 1fr}}
.bal-tag{font-size:11px;color:var(--mid);font-weight:700;margin-top:6px;text-align:right}
.bal-tag b{color:var(--ink)}
.rcpt-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center;min-height:62px;padding:4px;border-radius:11px;transition:.12s}
.rcpt-strip.dragover{outline:2px dashed var(--red);outline-offset:2px;background:var(--red-lt)}
.rcpt-thumb{width:62px;height:62px;border-radius:9px;border:1px solid var(--line);overflow:hidden;position:relative;background:#f4f6f8;flex-shrink:0}
.rcpt-thumb img{width:100%;height:100%;object-fit:cover}
.rcpt-thumb .rx{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:6px;background:rgba(17,24,39,.82);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:none}
.rcpt-thumb .rmode{position:absolute;bottom:0;left:0;right:0;background:rgba(17,24,39,.7);color:#fff;font-size:9px;
  text-align:center;font-weight:800;padding:1px;cursor:pointer;letter-spacing:.3px}
.add-rcpt{width:62px;height:62px;border-radius:9px;border:1.5px dashed var(--line);background:#f8fafc;color:var(--mute);
  display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;gap:2px}
.totals{display:flex;justify-content:space-between;align-items:center;padding-top:12px;margin-top:6px;border-top:2px solid var(--ink)}
.totals .tt-amt{font-size:20px;font-weight:900}.totals small{font-size:12px;color:var(--mute);font-weight:700}
.hint{font-size:11px;color:var(--mute);margin-top:6px;line-height:1.4}
.empty{text-align:center;color:var(--mute);padding:18px;font-size:13px}
.archived-tag{font-size:10px;font-weight:800;color:var(--amber);background:rgba(217,119,6,.12);padding:3px 8px;border-radius:999px}
/* modal */
.modal{position:fixed;inset:0;background:rgba(17,24,39,.55);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.sheet{background:var(--white);width:100%;max-width:560px;max-height:92dvh;overflow:auto;border-radius:18px 18px 0 0;
  padding:16px;padding-bottom:calc(20px + var(--safe-bot))}
@media(min-width:560px){.modal{align-items:center}.sheet{border-radius:18px}}
.sheet h3{font-size:16px;font-weight:800;margin-bottom:14px}
.sheet .row{margin-bottom:11px}
.sheet-actions{display:flex;gap:9px;margin-top:6px}.sheet-actions .btn{flex:1;justify-content:center}
.sheet.sheet-col{display:flex;flex-direction:column;padding:0;overflow:hidden}
.sheet-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:15px 16px 12px;border-bottom:1px solid var(--line);flex-shrink:0}
.sheet-head h3{margin:0;font-size:16px;font-weight:800}
.sheet-x{border:none;background:#f1f3f5;font-size:17px;line-height:1;color:var(--mid);cursor:pointer;width:32px;height:32px;border-radius:9px;flex-shrink:0;font-family:inherit}
.sheet-x:active{background:#e3e6ea}
.sheet-scroll{overflow:auto;padding:14px 16px 8px;flex:1;-webkit-overflow-scrolling:touch}
.sheet-foot{display:flex;gap:9px;padding:12px 16px;padding-bottom:calc(12px + var(--safe-bot));border-top:1px solid var(--line);flex-shrink:0;background:var(--white)}
.sheet-foot .btn{flex:1;justify-content:center}
.zoom{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:600;display:none;align-items:center;justify-content:center;padding:18px}
.zoom.open{display:flex}.zoom img{max-width:100%;max-height:100%;object-fit:contain}
.toast{position:fixed;left:50%;bottom:calc(26px + var(--safe-bot));transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:11px 18px;border-radius:12px;font-size:13px;font-weight:700;z-index:700;opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1}
/* ===== A4 ledger preview / print ===== */
#previewWrap{background:#dfe3e8;padding:14px;border-radius:0 0 12px 12px;overflow:auto;max-height:76vh;text-align:center}
#previewInner{display:inline-block;text-align:initial}
.a4{width:210mm;min-height:297mm;background:#fff;margin:0 auto;padding:13mm 12mm;box-shadow:0 10px 30px rgba(0,0,0,.18);
  transform-origin:top center;font-size:9.5pt;color:#000;position:relative}
.a4 .led-head{display:flex;justify-content:space-between;align-items:flex-end;gap:10mm;height:27mm;box-sizing:border-box}
.a4 .led-logo-box{width:30mm;height:11mm;border:.7pt solid #b9bdc4;border-radius:1mm;display:flex;align-items:center;justify-content:center;padding:1mm;margin-bottom:2mm}
.a4 .led-logo{max-width:100%;max-height:100%;object-fit:contain}
.a4 .led-co{font-size:12pt;font-weight:800;line-height:1.25;white-space:nowrap}
.a4 .led-name{font-size:12pt;font-weight:700;margin-top:1mm;line-height:1.25;white-space:nowrap}
.a4 .led-cur{font-size:8.5pt;font-weight:700;text-align:right;white-space:nowrap}
table.led{table-layout:fixed;border:1.2pt solid #000;border-left-width:2pt;border-right-width:2pt}
table.led{border-collapse:collapse;width:186mm;max-width:186mm;margin-top:5mm;font-size:7pt}
table.led col.c1{width:16mm}table.led col.c2{width:8mm}table.led col.c3{width:60mm}
table.led col.c4{width:18mm}table.led col.c5{width:10mm}table.led col.c6{width:18mm}
table.led col.c7{width:16mm}table.led col.c8{width:16mm}table.led col.c9{width:24mm}
table.led th,table.led td{border:.6pt solid #000;padding:1.2mm 1.5mm;vertical-align:middle;
  overflow:hidden;word-break:break-word}
table.led th{background:#f1f3f5;font-weight:800;text-align:center;font-size:7pt}
table.led td.l{text-align:left}table.led td.c{text-align:center;white-space:nowrap}table.led td.r{text-align:right;white-space:nowrap}
table.led td.sum-c{text-align:left;color:#1746a2;font-weight:400;font-size:6.6pt;white-space:nowrap;overflow:visible;line-height:1.1}
table.led td.sum-bal{text-align:right;color:#1746a2;font-weight:400}
table.led tr.thinrow td{height:.9mm;padding:0;line-height:0}
table.led thead th{border:2pt solid #000}
table.led tr.tot td{border-top:2pt solid #000;border-bottom:2pt solid #000}
table.led tr.thin2 td{border-bottom:1.8pt solid #000}
table.led tr.tot td{font-weight:800;background:#eef4ff}
.a4 .sign{margin-top:14mm;display:grid;grid-template-columns:auto 34mm auto;column-gap:3mm;row-gap:9mm;justify-content:end;align-items:end;font-size:9pt;font-weight:700}
.a4 .sign .s-lbl{white-space:nowrap;text-align:left}
.a4 .sign .s-blank{border-bottom:.6pt solid #000;height:1px;margin-bottom:1.2mm}
.a4 .sign .s-name{white-space:nowrap;text-align:left}
table.led td.plate{text-align:center;font-size:6.8pt;vertical-align:top;line-height:1.1}
table.led td.blankrow td,table.led tr.blankrow td{height:3mm}
/* receipt pages — free arrangement */
.rpage{position:relative;width:210mm;height:297mm;background:#fff;margin:14px auto 0;box-shadow:0 10px 30px rgba(0,0,0,.18);overflow:hidden}
.rpage.rp-edit{outline:1.5px dashed #c2c7cf}
.rbox{position:absolute;box-sizing:border-box}
.rbox img{width:100%;height:auto;display:block}
.rbox .rbar{position:absolute;left:0;top:0;right:0;height:18px;background:rgba(216,31,42,.92);color:#fff;font-size:10px;font-weight:800;
  display:flex;align-items:center;padding:0 6px;cursor:grab;touch-action:none;user-select:none}
.rbox .rhandle{position:absolute;right:2px;bottom:2px;width:20px;height:20px;border-radius:5px;background:var(--red);border:2px solid #fff;
  box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:nwse-resize;touch-action:none}
.rbox.dragging{outline:2px solid var(--red);z-index:5}
.fab{position:fixed;right:18px;bottom:calc(18px + var(--safe-bot));width:58px;height:58px;border-radius:50%;
  background:var(--red);color:#fff;font-size:32px;line-height:1;border:none;box-shadow:0 6px 20px rgba(0,0,0,.3);
  z-index:300;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.fab:active{transform:scale(.93)}
.fab.fab-pub{bottom:calc(158px + var(--safe-bot));background:var(--blue);font-size:25px}
.fab.fab-exp{bottom:calc(88px + var(--safe-bot));background:var(--green);font-size:25px}
/* รายการ (เรียบ อ่านง่าย: วันที่ · ประเภท · ยอด) */
.elist-item{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-left:4px solid var(--line);
  border-radius:12px;padding:11px 12px;background:var(--white);margin-bottom:9px;cursor:pointer;transition:background .12s}
.elist-item:active{background:#f6f8fa}
.elist-item.has-rcpt{border-left-color:var(--green)}
.eli-left{flex:1;min-width:0}
.eli-sub{font-size:11.5px;color:var(--mute);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eli-type{font-size:15px;font-weight:700;color:var(--ink);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eli-amt{font-size:16px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;white-space:nowrap}
.eli-go{font-size:22px;color:var(--mute);line-height:1;flex-shrink:0}
.rpage-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#aeb4bd;font-size:13px;font-weight:700;pointer-events:none}
#printRoot{display:none}
@media print{
  body{background:#fff}
  .topbar,.wrap,.modal,.zoom,.toast,#previewWrap,.no-print{display:none !important}
  #printRoot{display:block !important}
  #printRoot .a4,#printRoot .rpage{box-shadow:none;margin:0;page-break-after:always;break-after:page}
  #printRoot>*:last-child{page-break-after:auto !important;break-after:auto !important}
  #printRoot .rbox .rbar,#printRoot .rbox .rhandle{display:none !important}
  #printRoot .a4{min-height:auto;height:297mm}
  @page{size:A4;margin:0}
}
</style>
</head>

// Build the PDF filename: "<Name> Claim Gasoline Cash Advance in <Month> <Year>"
function exportTitle(){
  const fn=firstName()||(profile.name||'').trim()||'Surachet';
  let mName='',year='';
  const lbl=cur.label||'';
  const mm=lbl.match(/(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)/i);
  if(mm)mName=MONTHS[MM3.indexOf(mm[1].toLowerCase())];
  const digits=lbl.match(/\d+/g)||[];
  for(const d of digits){if(d.length===4){year=d;break;}}
  if(!year)for(const d of digits){if(d.length===2){year='20'+d;break;}}
  if(!mName||!year){
    const e=cur.entries.find(x=>/^\d{4}-\d{2}-\d{2}$/.test(x.date||''));
    if(e){const m=e.date.match(/^(\d{4})-(\d{2})-/);if(!year)year=m[1];if(!mName)mName=MONTHS[+m[2]-1];}
  }
  const now=new Date();
  if(!mName)mName=MONTHS[now.getMonth()];
  if(!year)year=String(now.getFullYear());
  return `${fn} Claim Gasoline Cash Advance in ${mName} ${year}`;
}

/* ---------------- IndexedDB ---------------- */
const DB_NAME='gasoline_db',DB_VER=1;
let _db=null;
function db(){return new Promise((res,rej)=>{
  if(_db)return res(_db);
  const r=indexedDB.open(DB_NAME,DB_VER);
  r.onupgradeneeded=e=>{const d=e.target.result;
    if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');
    if(!d.objectStoreNames.contains('receipts')){const s=d.createObjectStore('receipts',{keyPath:'id'});s.createIndex('month','monthId');s.createIndex('entry','entryId');}
  };
  r.onsuccess=e=>{_db=e.target.result;res(_db);};
  r.onerror=e=>rej(e.target.error);
});}
function tx(store,mode){return db().then(d=>d.transaction(store,mode).objectStore(store));}
function kvGet(k){return tx('kv','readonly').then(s=>new Promise((res,rej)=>{const r=s.get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);}));}
function kvSet(k,v){return tx('kv','readwrite').then(s=>new Promise((res,rej)=>{const r=s.put(v,k);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);}));}
function rcptPut(o){return tx('receipts','readwrite').then(s=>new Promise((res,rej)=>{const r=s.put(o);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);}));}
function rcptGet(id){return tx('receipts','readonly').then(s=>new Promise((res,rej)=>{const r=s.get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);}));}
function rcptDel(id){return tx('receipts','readwrite').then(s=>new Promise((res,rej)=>{const r=s.delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);}));}
function rcptByMonth(mid){return tx('receipts','readonly').then(s=>new Promise((res,rej)=>{const out=[];const idx=s.index('month');const r=idx.openCursor(IDBKeyRange.only(mid));r.onsuccess=e=>{const c=e.target.result;if(c){out.push(c.value);c.continue();}else res(out);};r.onerror=()=>rej(r.error);}));}

/* ---- chronological month order (for live reconciliation chain) ---- */
function monthKey(m){
  const fe=firstEntryDate(m); if(fe)return fe.slice(0,7);
  const lbl=(m&&m.label)||''; const mm=lbl.match(/(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)/i);
  let yr=(lbl.match(/\d{4}/)||[])[0]; if(!yr){const y2=lbl.match(/\d{2}/);yr=y2?('20'+y2[0]):'2026';}
  if(mm)return yr+'-'+String(MM3.indexOf(mm[1].toLowerCase())+1).padStart(2,'0');
  return '9999-99';
}
function chronPrevMonth(m){
  const k=monthKey(m); let best=null,bestK='';
  monthOrder.forEach(id=>{const o=months[id]; if(!o||o===m)return; const ok=monthKey(o);
    if(ok<k && ok>bestK){best=o;bestK=ok;}});
  return best;
}

function newMonthObj(label,prev){
  return {id:uid(),label:label||defaultMonthLabel(),createdAt:Date.now(),archived:false,
    head:headFromPrev(prev),
    entries:[]};
}
// snapshot Balance & Reimbursement (date + amount) from the previous month's last day
function headFromPrev(prev){
  if(prev){   // always carry from the previous month: balance = its final balance, reimb = its total spent
    const spent=totalSpent(prev);
    const finalBal=startBalance(prev)-spent;
    const lastDate=(prev.entries&&prev.entries.length)?prev.entries[prev.entries.length-1].date:'';
    return {balDate:lastDate,balAmount:finalBal,reimbDate:lastDate,reimbAmount:spent};
  }
  return {balDate:'',balAmount:0,reimbDate:'',reimbAmount:0};   // เดือนแรก (ไม่มีเดือนก่อนหน้า) เริ่มที่ศูนย์
}
function defaultMonthLabel(){const d=new Date();return d.toLocaleString('en-US',{month:'long'})+String(d.getFullYear()).slice(2);}

/* ---------------- Load / Save ---------------- */
async function load(){
  // ----- รูปแบบใหม่: หลายพนักงาน (db) -----
  const dbv=await kvGet('db');
  if(dbv && dbv.employees && dbv.employees.length){
    employees=dbv.employees; activeEmpId=dbv.activeEmpId||employees[0].id;
    gset=Object.assign(gset,dbv.gset||{});
    if(!gset.exportUrl)gset.exportUrl=DEFAULT_EXPORT_URL;
    dedupAllLocal(); await kvSet('db',{v:2,employees,activeEmpId,gset});   // ล้างรายการซ้ำที่ค้างในเครื่อง
    activateEmp(activeEmpId);
    return;
  }
  // ----- รูปแบบเดิม / ติดตั้งใหม่: สร้างพนักงานคนแรกจากข้อมูลเดิม -----
  const p=await kvGet('profile'); if(p)profile=Object.assign(profile,p);
  if(!profile.exportUrl)profile.exportUrl=DEFAULT_EXPORT_URL;
  if(profile.totalAmount==null)profile.totalAmount=Number(profile.fix)||0;
  if(profile.totalDate==null)profile.totalDate='2025-05-13';
  const m=await kvGet('months'); if(m){months=m.byId||{};monthOrder=m.order||[];}
  // migrate: ensure every month has a stored head snapshot
  let migrated=false;
  monthOrder.forEach((id,i)=>{
    const mo=months[id];if(!mo)return;
    if(!mo.head){
      const prev=i>0?months[monthOrder[i-1]]:null;
      mo.head=headFromPrev(prev);
      // preserve any old reimbursement date the user had typed
      if(mo.summary){const r=mo.summary.find(s=>s.key==='reimb');if(r&&r.date)mo.head.reimbDate=r.date;}
      delete mo.summary;migrated=true;
    }
  });
  const cm=await kvGet('curMonth');
  // one-time: ฝังเดือน May26 (เดือนที่กำลังทำงาน) จากไฟล์ Excel — สร้างก็ต่อเมื่อยังไม่มี
  let seededMayId=null;
  if(!profile.may26Seeded){
    const exists=monthOrder.some(id=>months[id]&&months[id].label==='May26');
    if(!exists){
      const may=newMonthObj('May26',null);
      may.head=Object.assign({},MAY26_SEED.head);
      may.entries=MAY26_SEED.entries.map((e,i)=>({id:'may26-'+(i+1),date:e.date,docNo:1,desc:e.desc,plate:profile.plate||'',refInv:'',customer:'',vendor:e.vendor||'',amount:Number(e.amount)||0,receiptIds:[],updatedAt:1}));
      months[may.id]=may;monthOrder.push(may.id);seededMayId=may.id;
    }
    profile.may26Seeded=true;migrated=true;await saveProfile();
  }
  if(!monthOrder.length){const nm=newMonthObj();months[nm.id]=nm;monthOrder=[nm.id];migrated=true;}
  // one-time: seed the first month's Balance/Reimbursement (and constants) from the attached Excel
  if(!profile.excelSeeded){
    const first=months[monthOrder[0]];
    // only seed a truly empty first month — never overwrite a month that already has data
    if(first && (!first.entries || !first.entries.length)){
      profile.fix=10000;profile.fixDate='';profile.totalDate='2025-05-13';profile.totalAmount=10000;
      first.head=Object.assign(first.head||{},EXCEL_SEED);
    }
    profile.excelSeeded=true;migrated=true;await saveProfile();
  }
  if(migrated)await kvSet('months',{byId:months,order:monthOrder});
  cur=months[cm]||months[monthOrder[monthOrder.length-1]];
  if(seededMayId)cur=months[seededMayId];
  // ห่อข้อมูลเดิมทั้งหมดเป็น "พนักงานคนแรก" แล้วเก็บเป็น db รูปแบบใหม่
  gset={}; GSET_FIELDS.forEach(f=>gset[f]=profile[f]);
  if(!gset.exportUrl)gset.exportUrl=DEFAULT_EXPORT_URL;
  const prof={}; EMP_FIELDS.forEach(f=>prof[f]=profile[f]);
  const emp={id:uid(),prof,months,order:monthOrder,curMonth:cur?cur.id:null};
  employees=[emp]; activeEmpId=emp.id;
  dedupAllLocal();
  await saveDB();
  activateEmp(activeEmpId);
}

/* ---------------- Running balance ---------------- */
function totalInHand(m){const h=(m&&m.head)?m.head:{};if(h.totalAmount!=null&&h.totalAmount!=='')return Number(h.totalAmount)||0;return Number(profile.fix)||Number(profile.totalAmount)||0;}
function startBalance(m){return totalInHand(m);}
function entryBalances(m){let b=startBalance(m);return m.entries.map(e=>{b-=Number(e.amount)||0;return b;});}
function totalSpent(m){return m.entries.reduce((s,e)=>s+(Number(e.amount)||0),0);}
function prevMonthOf(m){const i=monthOrder.indexOf(m.id);return i>0?months[monthOrder[i-1]]:null;}
// earliest entry date of the cycle — used as the Total in Hand / document start date
function firstEntryDate(m){
  const ds=(m.entries||[]).map(e=>e.date).filter(d=>/^\d{4}-\d{2}-\d{2}$/.test(d));
  if(!ds.length)return '';
  ds.sort();return ds[0];
}
// 4 summary lines: fix & total = settings constants; balance & reimb = this month's stored head snapshot
function summaryLines(m){
  const h=m.head||{};
  const fix=Number(profile.fix)||0;
  const total=totalInHand(m);
  const prev=chronPrevMonth(m);
  let balDate,balAmount,reimbAmount;
  if(prev){                                   // มีเดือนก่อนหน้า → คำนวณสด
    balAmount=totalInHand(prev)-totalSpent(prev);
    const pe=prev.entries||[]; balDate=pe.length?pe[pe.length-1].date:'';
    reimbAmount=(h.reimbAmount!=null&&h.reimbAmount!=='')?Number(h.reimbAmount):totalSpent(prev);
  }else{                                       // เดือนแรกสุด → ใช้ค่าที่เก็บไว้ (seed/กรอกเอง)
    balDate=h.balDate||''; balAmount=Number(h.balAmount)||0; reimbAmount=Number(h.reimbAmount)||0;
  }
  const reimbDate=(h.reimbDate!=null&&h.reimbDate!=='')?h.reimbDate:(prev?balDate:'');
  return [
    {key:'fix',  label:fixLabel(),                         date:profile.fixDate||'',amount:fix,           editDate:false,editAmount:false},
    {key:'bal',  label:'Balance Fix cash Advance at',      date:balDate,            amount:balAmount,     editDate:false,editAmount:false},
    {key:'reimb',label:'Reimbursement cash advance as at', date:reimbDate,          amount:reimbAmount,   editDate:true, editAmount:false},
    {key:'total',label:'Total Fix Cash Advance in Hand as',date:firstEntryDate(m)||reimbDate||'',amount:total, editDate:false,editAmount:true}
  ];
}

/* ---------------- Render ---------------- */
function sortEntries(m){
  if(!m||!m.entries)return;
  const ok=d=>/^\d{4}-\d{2}-\d{2}$/.test(d||'');
  m.entries.sort((a,b)=>{const da=ok(a.date)?a.date:'',db=ok(b.date)?b.date:'';
    if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return da<db?-1:da>db?1:0;});
}

// Paste from clipboard (button) — iOS Safari & desktop. iOS อ่าน clipboard ได้เฉพาะรูป/ข้อความ
async function pasteReceipt(){
  try{
    if(navigator.clipboard && navigator.clipboard.read){
      let items;
      try{ items=await navigator.clipboard.read(); }
      catch(err){ toast(err.name==='NotAllowedError'?'กดอนุญาตให้เข้าถึง clipboard ก่อน':('วางไม่ได้: '+(err.message||err))); return; }
      let found=false;
      for(const item of items){
        // เลือกชนิดที่รองรับ: รูปภาพก่อน แล้วค่อย PDF (ถ้าแพลตฟอร์มมีให้)
        const type=item.types.find(t=>t.indexOf('image/')===0)||item.types.find(t=>t==='application/pdf');
        if(type){
          const blob=await item.getType(type);
          const ext=(type==='application/pdf')?'pdf':((type.split('/')[1]||'png').split('+')[0]);
          await ingestReceipt(new File([blob],'pasted.'+ext,{type}));
          found=true;
        }
      }
      if(found){renderEmStrip();toast('วางจาก clipboard แล้ว');}
      else toast('ไม่พบรูปที่วางได้ · iOS วางได้เฉพาะ "รูป" — ถ้าเป็น PDF/ไฟล์ ให้กด "เลือกไฟล์" แล้วเลือกจากแอป Files');
    }else toast('เบราว์เซอร์นี้ไม่รองรับการวาง — ใช้ปุ่ม "เลือกไฟล์"');
  }catch(err){toast('วางไม่สำเร็จ: '+(err.message||err));}
}

async function ingestReceipt(f){
  try{
    if(f.type==='application/pdf'){
      const imgs=await pdfToBlobs(f);
      const base=(f.name||'receipt').replace(/\.pdf$/i,'');
      for(let i=0;i<imgs.length;i++){await storeReceipt(imgs[i].blob,base+(imgs.length>1?(' (p'+(i+1)+')'):'')+'.jpg',imgs[i].w,imgs[i].h);}
      await storeReceipt(f,f.name,0,0);   // เก็บไฟล์ PDF ต้นฉบับไว้ sync ขึ้น Drive ด้วย
    }else{
      const dim=await imgDims(f);
      await storeReceipt(f,f.name,dim.w,dim.h); // store original bytes — uncompressed/lossless
    }
  }catch(err){console.error(err);toast('อ่านไฟล์ไม่ได้: '+(err.message||err));}
}

/* ---------------- PDF receipt -> image blobs (lazy pdf.js) ---------------- */
let _pdfjs=null;
async function ensurePdfjs(){
  if(_pdfjs)return _pdfjs;
  await new Promise((res,rej)=>{const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=res;s.onerror=()=>rej(new Error('โหลด pdf.js ไม่ได้ (ต้องมีอินเทอร์เน็ตครั้งแรก)'));document.head.appendChild(s);});
  _pdfjs=window.pdfjsLib;_pdfjs.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  return _pdfjs;
}
async function pdfToBlobs(file){
  const lib=await ensurePdfjs();
  const buf=await file.arrayBuffer();
  const pdf=await lib.getDocument({data:buf}).promise;
  const out=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const vp=page.getViewport({scale:1});
    const target=1400;                                   // ความละเอียดพอดี ปลอดภัยกับหน่วยความจำ iOS
    let scale=Math.min(2,target/Math.max(vp.width,vp.height));
    let blob=null,cv;
    for(let attempt=0;attempt<3&&!blob;attempt++){
      const v2=page.getViewport({scale});
      cv=document.createElement('canvas');cv.width=Math.round(v2.width);cv.height=Math.round(v2.height);
      await page.render({canvasContext:cv.getContext('2d'),viewport:v2}).promise;
      blob=await new Promise(r=>cv.toBlob(r,'image/jpeg',0.85)); // JPEG = ไฟล์เล็ก iOS แปลงได้ชัวร์
      if(!blob)scale=scale*0.6;                           // iOS คืน null = ใหญ่ไป → ลดขนาดแล้วลองใหม่
    }
    if(blob)out.push({blob,w:cv.width,h:cv.height});
  }
  if(!out.length)throw new Error('แปลง PDF เป็นรูปไม่สำเร็จ (ลองไฟล์ที่เล็กลง)');
  return out;
}

/* ---------------- Receipts: free arrangement on A4 pages ---------------- */
function isPdfRcpt(r){return !!r&&(r.mime||'').toLowerCase().indexOf('pdf')>=0;}
async function receiptItems(m){
  const items=[];
  for(let ei=0;ei<m.entries.length;ei++){const e=m.entries[ei];
    if(!e.receiptIds)continue;
    for(const rid of e.receiptIds){const r=await rcptGet(rid);if(r&&!isPdfRcpt(r)&&r.blob instanceof Blob&&r.blob.size>0)items.push({r,entryNo:ei+1});}
  }
  return items;
}
async function ensureLay(items,m){
  const rlay=(m&&m.rlay)||{};
  items.forEach(it=>{const sv=rlay[it.r.id];if(sv&&typeof sv.pg==='number')it.r.lay={pg:sv.pg,x:sv.x,y:sv.y,w:sv.w};}); // ใช้ตำแหน่งที่ sync มาเป็นหลัก
  let nextPg=0;const changed=[];
  items.forEach(it=>{if(it.r.lay&&typeof it.r.lay.pg==='number')nextPg=Math.max(nextPg,it.r.lay.pg+1);});
  for(const it of items){
    const r=it.r;const iw=r.w||0,ih=r.h||0;
    if(!r.lay){                                            // เฉพาะของใหม่ที่ยังไม่จัด → ขนาดพอดีหน้า ไล่หน้าตามบิล
      const maxW=(iw&&ih)?128*(iw/ih):58;                  // กว้าง% สูงสุดที่รูปยังสูงไม่เกินหน้า (ไม่รู้ขนาด→ปลอดภัย 58)
      const portrait=ih>=iw;let w=portrait?Math.min(58,maxW):Math.min(92,maxW||92);w=Math.max(22,w);
      r.lay={pg:nextPg,x:Math.max(2,(100-w)/2),y:4,w};nextPg++;changed.push(r);
    }
  }
  for(const r of changed)await rcptPut(r);
  if(m){m.rlay=m.rlay||{};let dirty=false;                 // บันทึกตำแหน่งลง DB เดือน เพื่อ sync
    items.forEach(it=>{const L=it.r.lay,ex=m.rlay[it.r.id];
      if(!ex||ex.pg!==L.pg||ex.x!==L.x||ex.y!==L.y||ex.w!==L.w){m.rlay[it.r.id]={pg:L.pg,x:L.x,y:L.y,w:L.w};dirty=true;}});
    if(dirty)await saveMonths();}
}
function pageCountOf(items,m){
  let mp=0;items.forEach(it=>{mp=Math.max(mp,(it.r.lay?it.r.lay.pg:0)+1);});
  return Math.max(mp,(m.rpc||0),items.length?1:0);
}
async function buildReceiptPages(m,interactive){
  const items=await receiptItems(m);
  await ensureLay(items,m);
  const total=pageCountOf(items,m);
  const nodes=[];
  for(let p=0;p<total;p++){
    const its=items.filter(it=>it.r.lay.pg===p);
    if(!interactive && its.length===0)continue;          // skip empty pages in the PDF
    const pg=document.createElement('div');pg.className='rpage'+(interactive?' rp-edit':'');pg.dataset.pg=p;
    if(interactive && its.length===0){const ph=document.createElement('div');ph.className='rpage-empty';ph.textContent='ลากใบเสร็จมาวางที่นี่';pg.appendChild(ph);}
    its.forEach(it=>pg.appendChild(makeRBox(it,interactive)));
    nodes.push(pg);
  }
  return nodes;
}
let _zTop=10;
function makeRBox(it,interactive){
  const r=it.r;const url=makeUrl(r.blob);
  const box=document.createElement('div');box.className='rbox';box.dataset.id=r.id;
  box.style.left=r.lay.x+'%';box.style.top=r.lay.y+'%';box.style.width=r.lay.w+'%';
  box.innerHTML=`<img draggable="false" src="${url}">`+(interactive?`<div class="rbar">⠿ #${it.entryNo}</div><div class="rhandle"></div>`:'');
  const _im=box.querySelector('img');
  if(_im){
    _im.addEventListener('error',()=>{box.style.display='none';});
    _im.addEventListener('load',async()=>{                 // ถ้ารูปสูงเกินหน้า → หดให้พอดี (handle จะเอื้อมถึง วางซ้อนได้)
      const page=box.parentElement;if(!page)return;const pageH=page.clientHeight,pageW=page.clientWidth;
      if(!pageH||!pageW||!_im.naturalWidth)return;
      const boxH=box.clientWidth*(_im.naturalHeight/_im.naturalWidth);
      if(boxH>pageH*0.97){
        const wPct=Math.max(10,(pageH*0.97*(_im.naturalWidth/_im.naturalHeight))/pageW*100);
        box.style.width=wPct+'%';
        if(interactive&&Math.abs((r.lay.w||0)-wPct)>0.5){
          r.lay.w=wPct;if(r.lay.x+wPct>100){r.lay.x=Math.max(0,100-wPct);box.style.left=r.lay.x+'%';}
          try{await rcptPut(r);cur.rlay=cur.rlay||{};cur.rlay[r.id]={pg:r.lay.pg,x:r.lay.x,y:r.lay.y,w:r.lay.w};await saveMonths();}catch(_){}
        }
      }
    });
  }
  if(interactive)enableRBox(box,r);
  return box;
}
function enableRBox(box,r){
  const bar=box.querySelector('.rbar'),handle=box.querySelector('.rhandle');
  let mv=null;
  bar.addEventListener('pointerdown',e=>{e.preventDefault();bar.setPointerCapture(e.pointerId);box.style.zIndex=String(++_zTop);
    mv={px:e.clientX,py:e.clientY,x:r.lay.x,y:r.lay.y,page:box.parentElement};box.classList.add('dragging');});
  bar.addEventListener('pointermove',e=>{if(!mv)return;e.preventDefault();
    const rc=mv.page.getBoundingClientRect();
    let nx=mv.x+((e.clientX-mv.px)/rc.width*100),ny=mv.y+((e.clientY-mv.py)/rc.height*100);
    nx=Math.max(0,Math.min(96,nx));ny=Math.max(0,Math.min(98,ny));
    r.lay.x=nx;r.lay.y=ny;box.style.left=nx+'%';box.style.top=ny+'%';});
  bar.addEventListener('pointerup',async e=>{if(!mv)return;box.classList.remove('dragging');
    try{bar.releasePointerCapture(e.pointerId);}catch(_){}
    const under=document.elementFromPoint(e.clientX,e.clientY);
    const tgt=under&&under.closest?under.closest('.rpage'):null;
    if(tgt&&tgt!==mv.page){const rc=tgt.getBoundingClientRect();
      r.lay.pg=parseInt(tgt.dataset.pg);
      r.lay.x=Math.max(0,Math.min(80,((e.clientX-rc.left)/rc.width*100)-(r.lay.w/2)));
      r.lay.y=Math.max(0,Math.min(90,((e.clientY-rc.top)/rc.height*100)-2));
      const ph=tgt.querySelector('.rpage-empty');if(ph)ph.remove();
      tgt.appendChild(box);box.style.left=r.lay.x+'%';box.style.top=r.lay.y+'%';
      if(mv.page&&!mv.page.querySelector('.rbox')&&mv.page.classList.contains('rp-edit')){
        const e2=document.createElement('div');e2.className='rpage-empty';e2.textContent='ลากใบเสร็จมาวางที่นี่';mv.page.appendChild(e2);}
    }
    mv=null;await rcptPut(r);cur.rlay=cur.rlay||{};cur.rlay[r.id]={pg:r.lay.pg,x:r.lay.x,y:r.lay.y,w:r.lay.w};await saveMonths();});
  let rz=null;
  handle.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();handle.setPointerCapture(e.pointerId);box.style.zIndex=String(++_zTop);
    rz={px:e.clientX,w:r.lay.w,page:box.parentElement};});
  handle.addEventListener('pointermove',e=>{if(!rz)return;e.preventDefault();
    const rc=rz.page.getBoundingClientRect();let nw=rz.w+((e.clientX-rz.px)/rc.width*100);
    nw=Math.max(12,Math.min(100-r.lay.x,nw));r.lay.w=nw;box.style.width=nw+'%';});
  handle.addEventListener('pointerup',async e=>{if(!rz)return;try{handle.releasePointerCapture(e.pointerId);}catch(_){}rz=null;await rcptPut(r);cur.rlay=cur.rlay||{};cur.rlay[r.id]={pg:r.lay.pg,x:r.lay.x,y:r.lay.y,w:r.lay.w};await saveMonths();});
}

function gsReady(){return (profile.exportUrl||'').indexOf('http')===0;}
// จับคู่พนักงานข้ามเครื่องด้วย "รหัสพนักงาน" (ถ้าไม่มีรหัส ใช้ id) — กัน id สุ่มไม่ตรงกัน
function empKey(e){const p=(e&&e.prof)||{};const nm=(p.name||'').toString().trim().toLowerCase();if(nm)return 'name:'+nm;const c=(p.code||'').toString().trim().toLowerCase();if(c)return 'code:'+c;return 'id:'+((e&&e.id)||'');}
// รวมระดับรายการ: จับเดือนด้วย label, จับรายการด้วย id (รายการใหม่ที่เพิ่มในเครื่องจะไม่ถูกลบ)
// ลายนิ้วมือเนื้อหา (ตรงกันทุกช่อง = รายการเดียวกัน) ใช้ยุบรายการซ้ำข้ามเครื่อง
function entFp(e){return [e.date||'',e.docNo||'',(e.desc||'').trim(),(e.plate||'').trim(),(e.refInv||'').trim(),(e.customer||'').trim(),(e.vendor||'').trim(),Number(e.amount)||0].join('\u0001');}
function dedupEntries(arr){
  const by={};
  (arr||[]).forEach(e=>{const k=entFp(e);const ex=by[k];
    if(!ex){by[k]=e;return;}
    const exR=(ex.receiptIds||[]).length,eR=(e.receiptIds||[]).length;          // เก็บอันที่มีใบเสร็จ/ใหม่กว่า
    if(eR>exR||(eR===exR&&Number(e.updatedAt||0)>Number(ex.updatedAt||0)))by[k]=e;
  });
  return Object.keys(by).map(k=>by[k]);
}
function dedupAllLocal(){ employees.forEach(e=>Object.keys(e.months||{}).forEach(mid=>{e.months[mid].entries=dedupEntries(e.months[mid].entries);})); }
function mergeEntries(la,ca){
  const by={}; (la||[]).forEach(e=>{by[e.id]=e;});
  (ca||[]).forEach(ce=>{const le=by[ce.id]; if(!le||Number(ce.updatedAt||0)>Number(le.updatedAt||0))by[ce.id]=ce;});
  return dedupEntries(Object.keys(by).map(k=>by[k]));   // รวมตาม id แล้วยุบซ้ำตามเนื้อหา
}
function mergeMonths(lm,cm,localNewer){
  const out=Object.assign({},lm,cm);            // ฟิลด์ทั่วไป
  out.id=lm.id||cm.id; out.label=lm.label||cm.label;
  out.head=(localNewer?lm.head:cm.head)||lm.head||cm.head||{};
  // ตำแหน่งใบเสร็จ: รวมราย receipt-id (ไม่ทิ้งของอีกเครื่อง) — เครื่องที่ใหม่กว่าชนะเฉพาะ id ที่ชนกัน
  out.rlay=localNewer?Object.assign({},cm.rlay||{},lm.rlay||{}):Object.assign({},lm.rlay||{},cm.rlay||{});
  out.entries=mergeEntries(lm.entries,cm.entries);
  return out;
}
function mergeEmployee(le,ce){
  if(!le)return ce; if(!ce)return le;
  const localNewer=Number(le.updatedAt||0)>=Number(ce.updatedAt||0);
  const res={id:le.id,prof:(localNewer?le.prof:ce.prof)||le.prof||ce.prof,
    updatedAt:Math.max(Number(le.updatedAt||0),Number(ce.updatedAt||0)),
    months:{},order:[],curMonth:le.curMonth||ce.curMonth};
  const lBy={},cBy={};
  Object.keys(le.months||{}).forEach(id=>{const m=le.months[id];lBy[m.label]=m;});
  Object.keys(ce.months||{}).forEach(id=>{const m=ce.months[id];cBy[m.label]=m;});
  const labels={}; Object.keys(lBy).forEach(l=>labels[l]=1); Object.keys(cBy).forEach(l=>labels[l]=1);
  Object.keys(labels).forEach(lbl=>{
    const lm=lBy[lbl],cm=cBy[lbl]; const m=(lm&&cm)?mergeMonths(lm,cm,localNewer):(lm||cm);
    res.months[m.id]=m; res.order.push(m.id);
  });
  if(!res.months[res.curMonth])res.curMonth=res.order[res.order.length-1]||null;
  return res;
}

function gsDelRcpt(id){ // ลบไฟล์ใบเสร็จเก่าออกจาก Drive (best-effort)

function syncStatus(msg,silent){const el=$('syncStatus');if(el)el.textContent=msg;if(!silent)toast(msg);}
function jsonpSync(params){return new Promise((res,rej)=>{
  const cb='__sc'+Date.now()+Math.floor(Math.random()*1e6);const s=document.createElement('script');let done=false;
  function clean(){try{delete window[cb];}catch(_){window[cb]=undefined;}if(s.parentNode)s.parentNode.removeChild(s);}
  window[cb]=d=>{done=true;clean();res(d);};
  const base=profile.exportUrl;const q=new URLSearchParams(Object.assign({},params,{callback:cb})).toString();
  s.src=base+(base.indexOf('?')>=0?'&':'?')+q;
  s.onerror=()=>{if(!done){clean();rej(new Error('network'));}};
  document.body.appendChild(s);setTimeout(()=>{if(!done){clean();rej(new Error('timeout'));}},30000);
});}
function rcptAll(){return tx('receipts','readonly').then(s=>new Promise((res,rej)=>{const out=[];const r=s.openCursor();
  r.onsuccess=e=>{const c=e.target.result;if(c){out.push(c.value);c.continue();}else res(out);};r.onerror=()=>rej(r.error);}));}
function blobToB64(blob){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(',')[1]);r.onerror=()=>rej(r.error);r.readAsDataURL(blob);});}
function b64ToBlob(b64,mime){const bin=atob(b64);const u8=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);return new Blob([u8],{type:mime||'application/octet-stream'});}

function scheduleSyncPush(){clearTimeout(_syncPushTimer);_syncPushTimer=setTimeout(()=>{gsSyncPush(true);},2500);}

async function gsSyncPush(silent,replace){
  if(!gsReady()||_syncBusy)return;_syncBusy=true;if(!silent)syncStatus(replace?'กำลังเขียนทับคลาวด์ด้วยข้อมูลเครื่องนี้…':'กำลังส่งข้อมูลขึ้นคลาวด์…');
  try{
    syncActiveBack();
    // map: monthId → โฟลเดอร์ของพนักงาน (ชื่อ-รหัส) เพื่อเก็บใบเสร็จแยกคน
    const folderOfMonth={};
    employees.forEach(e=>{const f=empFolderName(e);Object.keys(e.months||{}).forEach(mid=>{folderOfMonth[mid]=f;});});
    // 1) อัปใบเสร็จที่ยังไม่ได้ซิงค์ เข้าโฟลเดอร์ของคนนั้น
    const all=await rcptAll();
    for(const r of all){
      if(r.synced||!r.blob)continue;
      const b64=await blobToB64(r.blob);
      await fetch(profile.exportUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify({action:'uploadrcpt',id:r.id,folder:folderOfMonth[r.monthId]||'',mime:r.mime||'image/jpeg',name:r.name||r.id,b64})});
      r.synced=true;await rcptPut(r);
      await new Promise(res=>setTimeout(res,180));
    }
    // 2) ส่งฐานข้อมูล (พนักงาน/เดือน/รายการ/หัวตาราง) — ไม่รวม blob
    await fetch(profile.exportUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'syncpush',replace:!!replace,gset,employees})});
    syncStatus((replace?'เขียนทับคลาวด์แล้ว ':'ซิงค์ขึ้นคลาวด์แล้ว ')+new Date().toLocaleTimeString(),silent);
  }catch(e){console.error(e);if(!silent)syncStatus('ส่งข้อมูลไม่สำเร็จ — ตรวจการ Deploy Code.gs ใหม่ · '+(e.message||e));}
  finally{_syncBusy=false;}
}

async function gsSyncPull(silent,mode){
  if(!gsReady())return;if(!silent)syncStatus(mode==='replace'?'กำลังดึงข้อมูลมาแทนที่…':'กำลังดึงข้อมูลจากคลาวด์…');
  try{
    syncActiveBack();
    const data=await jsonpSync({action:'syncpull',t:Date.now()});
    if(!data||!data.ok||!Array.isArray(data.employees)){if(!silent)syncStatus((data&&data.error)?('คลาวด์แจ้ง: '+data.error):'ยังไม่มีข้อมูลบนคลาวด์ — ไปกด 🔄 บนเครื่องที่มีข้อมูล (เช่นมือถือ) ก่อน');return;}
    // จับคู่ด้วยรหัสพนักงาน · ปกติ "รวมระดับรายการ" (ไม่ลบของใหม่) · mode replace = เอาคลาวด์แทนที่
    const actKey=empKey(employees.find(e=>e.id===activeEmpId)||employees[0]||{});
    const byKey={};employees.forEach(e=>{byKey[empKey(e)]=e;});
    data.employees.forEach(ce=>{const k=empKey(ce);byKey[k]=(mode==='replace')?ce:(byKey[k]?mergeEmployee(byKey[k],ce):ce);});
    employees=Object.keys(byKey).map(k=>byKey[k]);
    const url=gset.exportUrl;gset=Object.assign(gset,data.gset||{});gset.exportUrl=url||gset.exportUrl||DEFAULT_EXPORT_URL;
    const actEmp=employees.find(e=>empKey(e)===actKey);
    activeEmpId=(actEmp&&actEmp.id)||(employees[0]&&employees[0].id);
    await kvSet('db',{v:2,employees,activeEmpId,gset});
    // ดึงใบเสร็จที่ยังไม่มีในเครื่อง (ตามโฟลเดอร์ของพนักงานคนนั้น)
    const rmap={};
    employees.forEach(e=>{const folder=empFolderName(e);Object.keys(e.months||{}).forEach(mid=>{const m=e.months[mid];(m.entries||[]).forEach(en=>(en.receiptIds||[]).forEach(id=>{rmap[id]={monthId:m.id||mid,entryId:en.id,folder};}));});});
    let dl=0;const ids=Object.keys(rmap);
    for(const id of ids){
      let have=null;try{have=await rcptGet(id);}catch(_){have=null;}
      if(have)continue;
      const rd=await jsonpSync({action:'getrcpt',id,folder:rmap[id].folder,t:Date.now()});
      if(rd&&rd.ok&&rd.b64){const blob=b64ToBlob(rd.b64,rd.mime);let dim={w:0,h:0};try{dim=await imgDims(blob);}catch(_){}
        await rcptPut({id,monthId:rmap[id].monthId,entryId:rmap[id].entryId,name:rd.name||id,mime:rd.mime||'image/jpeg',blob,w:dim.w,h:dim.h,mode:'auto',synced:true,addedAt:Date.now()});dl++;}
    }
    activateEmp(activeEmpId);render();
    syncStatus('ซิงค์สำเร็จ · พนักงาน '+employees.length+' คน'+(dl?(' · ใบเสร็จใหม่ '+dl):'')+' · '+new Date().toLocaleTimeString(),silent);
  }catch(e){console.error(e);
    if(!silent){
      syncStatus('เชื่อมต่อคลาวด์ไม่ได้');
      alert('ดึงข้อมูลจากคลาวด์ไม่สำเร็จ\n\nสาเหตุที่พบบ่อย:\n• ยังไม่ได้ Deploy Code.gs เวอร์ชันใหม่ (ที่มีระบบซิงค์)\n   → Apps Script: Deploy → Manage deployments → ✏️ แก้ไข → Version = New version → Deploy\n   (ต้องเป็น New version ของอันเดิม ไม่ใช่ New deployment ที่ได้ URL ใหม่)\n• สิทธิ์ Web app ไม่ใช่ "Anyone"\n\nตรวจให้ชัด: เปิดลิงก์นี้ในเบราว์เซอร์\n'+profile.exportUrl+'?action=syncpull\n→ เห็น {"ok":true,...} = พร้อมใช้\n→ เห็น "Gasoline endpoint OK" = Code.gs ยังเป็นเวอร์ชันเก่า\n→ เจอหน้า login/ขอสิทธิ์ = สิทธิ์ไม่ใช่ Anyone');
    }
  }
}
async function gsSyncNow(){ await gsSyncPull(false); await gsSyncPush(false); }
async function gsForcePull(){ if(!confirm('ดึงข้อมูลจากคลาวด์มา "แทนที่" ข้อมูลในเครื่องนี้?\n(ใช้ตอนต้องการให้เครื่องนี้ตรงกับคลาวด์ — ข้อมูลในเครื่องที่ยังไม่ได้ส่งจะถูกแทนที่)'))return; await gsSyncPull(false,'replace'); }
async function gsMakeMain(){ if(!confirm('ตั้ง "เครื่องนี้เป็นหลัก" แล้วเขียนทับข้อมูลบนคลาวด์ด้วยข้อมูลเครื่องนี้?\n(ใช้ตอนข้อมูลเครื่องนี้ถูกต้องที่สุด)'))return; await gsSyncPush(false,true); }
{const a=$('btnSyncNow');if(a)a.addEventListener('click',gsSyncNow);
 const b=$('btnForcePull');if(b)b.addEventListener('click',gsForcePull);
 const c=$('btnMakeMain');if(c)c.addEventListener('click',gsMakeMain);}

/* ---------------- Zoom ---------------- */
function openZoom(url){$('zoomImg').src=url;$('zoom').classList.add('open');}
$('zoom').addEventListener('click',()=>$('zoom').classList.remove('open'));

/* ---------------- init ---------------- */
(async function(){
  try{await load();render();
    _ready=true;
    if(gsReady())gsSyncPull(true);                 // ดึงข้อมูลล่าสุดอัตโนมัติตอนเปิด (เงียบ)
    document.addEventListener('visibilitychange',()=>{
      if(!gsReady())return;
      if(document.visibilityState==='visible')gsSyncPull(true);   // กลับเข้าแอป → ดึงล่าสุด
      else gsSyncPush(true);                                      // ออกจากแอป → ส่งขึ้น
    });
    window.addEventListener('pagehide',()=>{if(gsReady())gsSyncPush(true);});
    setInterval(()=>{ if(_ready&&gsReady()&&!_syncBusy&&document.visibilityState==='visible') gsSyncPull(true); },45000); // ดึงอัตโนมัติเป็นระยะ
  }catch(err){console.error(err);alert('เริ่มต้นแอพไม่ได้: '+(err.message||err));}
})();
