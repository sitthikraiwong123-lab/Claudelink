function upq(){ if(!Array.isArray(state._upq)) state._upq=[]; return state._upq; }
function upqAdd(job){ const q=upq(); if(!q.some(j=>j.monthId===job.monthId&&j.entryId===job.entryId&&j.kind===job.kind&&j.name===job.name)){ q.push({...job, ts:Date.now()}); saveState(); } }
async function upqDataOf(job){
  const m=state.months.find(x=>x.id===job.monthId); const e=m&&m.entries.find(x=>x.id===job.entryId);
  if(!e) return null;
  if(job.kind==="lineimg"){ try{ const li=await buildLineImgs(e);
    const ix=parseInt((String(job.name).match(/lineimg_(\d+)/)||[])[1]||"1",10)-1;
    const im=li[ix]; return im?im.dataUrl:null; }catch(_){ return null; } }
  if(job.kind==="receipt") return e.receiptPage||null;
  if(job.kind==="receiptmeta"){ if(!e.receiptMeta) return null; try{ return "data:application/json;base64,"+btoa(unescape(encodeURIComponent(JSON.stringify(e.receiptMeta)))); }catch(_){ return null; } }
  if(job.kind==="tax") return e.taxPage||null;
  if(job.kind==="taxpdf"){ const p=(e.taxPdfs||[]).find(x=>x&&x.name===job.name)||(e.taxPdfs||[])[job.idx||0]; return p?p.src:null; }
  if(job.kind==="taximg"){ const p=(e.taxImgs||[]).find(x=>x&&x.name===job.name); return p?p.src:null; }
  return null;
}
let _upqBusy=false;
async function processUploadQueue(fromResume){
  if(_upqBusy || !gsReady()) return;
  const q=upq(); if(!q.length) return;
  _upqBusy=true;
  if(fromResume) toast(`☁️ อัปโหลดต่อจากคราวก่อน ${q.length} ไฟล์…`);
  try{
    while(q.length){
      const job=q[0];
      const dataUrl=await upqDataOf(job);
      if(!dataUrl){ q.shift(); saveState(); continue; }        // รายการถูกลบ/ไม่มีข้อมูลแล้ว -> ข้าม
      const c=dataUrl.indexOf(","); const b64=c>=0?dataUrl.slice(c+1):dataUrl;
      try{
        await fetch(GS.url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},
          body:JSON.stringify({action:"upload",file:{month:job.monthId,key:job.key,kind:job.kind,name:job.name,mime:job.mime,b64,sig:String(dataUrl.length)}})});
        q.shift(); saveState();
        await new Promise(r=>setTimeout(r,300));
      }catch(err){ console.error("upq",err); break; }           // เน็ตล้ม -> หยุดไว้ ค่อยลองใหม่ตอน resume
    }
  } finally { _upqBusy=false; updateCloudUI&&updateCloudUI(); }
  if(!upq().length && fromResume){ toast("✓ อัปโหลดค้างเสร็จครบแล้ว"); clearTimeout(_upPullTimer); _upPullTimer=setTimeout(()=>gsPullAll(false),2500); }
}

// อัปไฟล์หลัง Save + แทนที่ของเดิมเมื่อเปลี่ยน + ลบไฟล์เก่าเมื่อกุญแจเปลี่ยน
/* ── สำเนารูปใบเสร็จสำหรับแนบใน LINE (JPEG ย่อ ≤1200px, ≤4 รูป) ── */
async function normLineJpeg(dataUrl, maxW=1200, q=0.8){
  return new Promise(res=>{ const im=new Image();
    im.onload=()=>{ try{
      const w0=im.naturalWidth||maxW, h0=im.naturalHeight||maxW;
      const sc=Math.min(1, maxW/w0);
      const w=Math.max(1,Math.round(w0*sc)), h=Math.max(1,Math.round(h0*sc));
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      const ctx=c.getContext("2d"); ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); ctx.drawImage(im,0,0,w,h);
      res(c.toDataURL("image/jpeg",q));
    }catch(err){ res(null); } };
    im.onerror=()=>res(null); im.src=dataUrl; });
}
async function buildLineImgs(e){
  const srcs=[];
  (e.taxImgs||[]).forEach(p=>{ if(p&&p.src) srcs.push(p.src); });                      // รูปที่ถ่าย/อัปเอง
  if(!srcs.length){
    for(const p of (e.taxPdfs||[])){                                                    // PDF -> แปลงหน้าแรกเป็นรูป
      if(p&&p.src&&window.pdfjsLib){ try{ const pages=await rasterizePdf(p.src,1.4); if(pages&&pages[0]) srcs.push(pages[0]); }catch(_){ } }
      if(srcs.length) break;
    }
  }
  if(!srcs.length && e.taxPage) srcs.push(e.taxPage);
  if(!srcs.length && e.receiptPage) srcs.push(e.receiptPage);
  const out=[];
  for(let i=0;i<srcs.length && out.length<4;i++){ const j=await normLineJpeg(srcs[i]); if(j) out.push({name:`lineimg_${out.length+1}.jpg`, dataUrl:j}); }
  return out;
}
async function gsSyncEntryFiles(m, e, oldKey, oldDrive, pendingDel){
  if(!gsReady()||!e) return 0;

  const keyChanged=oldKey&&newKey&&oldKey!==newKey;
  const sigOf=d=>d?String(d.length):"";

  // 0) ลบไฟล์ที่ผู้ใช้เพิ่งสั่งลบ (จากปุ่ม ลบใบเสร็จ/ลบ A4/× บน PDF)
  for(const o of pendingDel){ if(o.fileId){ await gsDeleteDriveFile(o.fileId, o.month||m.id, o.key||newKey, o.kind, o.name); del++; } }
  async function doUpload(kind,name,mime,dataUrl){
    const localSig=sigOf(dataUrl);
    const cur=df.find(f=>f.kind===kind&&f.name===name);
    if(cur && String(cur.sig||"")===localSig) return;          // เนื้อหาเหมือนเดิม -> ข้าม
    const oldF=oldDrive.find(f=>f.kind===kind && f.key && f.key!==newKey);   // ไฟล์คีย์เก่า (รวมคีย์ legacy) -> ลบก่อนอัปใหม่
    if(oldF&&oldF.fileId){ await gsDeleteDriveFile(oldF.fileId, oldF.month||m.id, oldF.key||oldKey, kind, oldF.name); del++; }
    upqAdd({monthId:m.id, entryId:e.id, key:newKey, kind, name, mime}); up++;
  }
  if(e.receiptPage) await doUpload("receipt",`receipt_${newKey}.jpg`,"image/jpeg",e.receiptPage);
  if(e.receiptPage && e.receiptMeta){ try{ const mj=JSON.stringify(e.receiptMeta); const mb=btoa(unescape(encodeURIComponent(mj)));
    await doUpload("receiptmeta",`receiptmeta_${newKey}.json`,"application/json","data:application/json;base64,"+mb); }catch(err){ console.error("meta up",err); } }
  if(e.taxPage)     await doUpload("tax",`tax_${newKey}.jpg`,"image/jpeg",e.taxPage);
  const pdfs=(e.taxPdfs||[]);
  for(let i=0;i<pdfs.length;i++){ const p=pdfs[i]; if(p&&p.src) await doUpload("taxpdf",(p.name||`tax_${newKey}_${i+1}.pdf`),"application/pdf",p.src); }
  const timgs=(e.taxImgs||[]);
  for(let i=0;i<timgs.length;i++){ const p=timgs[i]; if(p&&p.src) await doUpload("taximg",(p.name||`taximg_${newKey}_${i+1}.jpg`),"image/jpeg",p.src); }
  // สำเนารูปใบเสร็จสำหรับแนบใน LINE (เฉพาะรายการที่มีคนสำรองจ่าย — ชีตจะแจ้ง LINE เมื่อรูปพวกนี้อัปเสร็จ)
  if(e.payee){
    try{ const li=await buildLineImgs(e);
      for(const im of li) await doUpload("lineimg", im.name, "image/jpeg", im.dataUrl);
    }catch(err){ console.error("lineimg", err); }
  }
  // กุญแจเปลี่ยน: ลบ taxpdf ชื่อเก่าที่ไม่ถูกอัปใหม่
  for(const o of oldDrive){ if(o.kind==="taxpdf"&&o.fileId&&o.key&&o.key!==newKey){
    const still=pdfs.some((p,i)=>p&&p.src&&(p.name||`tax_${newKey}_${i+1}.pdf`)===o.name);
    if(!still){ await gsDeleteDriveFile(o.fileId,o.month||m.id,o.key,"taxpdf",o.name); del++; }
  } }
  if(up||del){ saveState(); toast(`☁️ Drive: อัป ${up}${del?(" · ลบเก่า "+del):""} รายการ`);
    await processUploadQueue(false);
    clearTimeout(_upPullTimer); _upPullTimer=setTimeout(()=>gsPullAll(false), 3000); }
  return up;
}

const _MSM={january:1,febuary:2,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12};
function sheetNameToId(name){ const m=String(name||"").match(/^([A-Za-z]+)\s*([0-9]{2})$/); if(!m) return null;
  const mo=_MSM[m[1].toLowerCase()]; if(!mo) return null; return `20${m[2]}-${String(mo).padStart(2,"0")}`; }
function monthLabelOf(y,mo){ return `${MONTH_NAMES[mo-1].slice(0,3)} ${String(y).slice(2)}`; }
function ensureMonthForDate(dateStr){
  const y=+dateStr.slice(0,4), mo=+dateStr.slice(5,7);
  const id=`${y}-${String(mo).padStart(2,"0")}`;
  let m=state.months.find(x=>x.id===id);
  if(!m){
    const prev=state.months.filter(x=>x.id<id).sort((a,b)=>a.id<b.id?-1:1).pop()||null;
    m={id,label:monthLabelOf(y,mo),year:y,month:mo,
      sheetName:`${MONTH_NAMES[mo-1]}${String(y).slice(2)}`,
      header:newMonthHeaderFrom(prev),
      entries:[]};
    state.months.push(m); state.months.sort((a,b)=>a.id<b.id?-1:1);
  }
  return m;
}
function monthDiffOf(dateStr, monthId){
  return ((+dateStr.slice(0,4))*12 + (+dateStr.slice(5,7))) - ((+monthId.slice(0,4))*12 + (+monthId.slice(5,7)));
}
function openMonthGuard(dateStr, m){
  const y=+dateStr.slice(0,4), mo=+dateStr.slice(5,7);
  const dLabel=fmtDateDD(dateStr), tgt=monthLabelOf(y,mo);
  const diff=monthDiffOf(dateStr, m.id); state._mgDiff=diff;

  btn.style.display="";

    txt.innerHTML=`รายการนี้ลงวันที่ <b>${esc(dLabel)}</b> ซึ่งเป็นของเดือนถัดไป <b>"${esc(tgt)}"</b><br>แต่คุณกำลังบันทึกอยู่ในเดือน <b>"${esc(m.label)}"</b><br><br>ถ้าใบเสร็จเป็นของเดือน ${esc(tgt)} จริง ระบบจะ<b>ขึ้นเดือนใหม่และสร้างรายการที่เดือนนั้น</b>ให้เลย`;
    btn.textContent=`✅ ใช่ บิลของเดือน ${tgt} — สร้างรายการที่เดือนใหม่`;
  } else if(diff===-1){
    ttl.textContent="⚠️ วันที่เป็นของเดือนที่แล้ว";
    txt.innerHTML=`รายการนี้ลงวันที่ <b>${esc(dLabel)}</b> ซึ่งเป็นของเดือนที่แล้ว (<b>${esc(tgt)}</b>)<br><br>ถ้าเป็น<b>บิลตกค้าง</b>จากเดือน ${esc(tgt)} จริง ระบบจะบันทึกไว้ในเดือน <b>${esc(m.label)}</b> ตามเดิม และเติมหมายเหตุ <b>"(Lacking bill from last month)"</b> ต่อท้ายรายละเอียดให้อัตโนมัติ`;
    btn.textContent=`✅ ใช่ บิลตกค้างจากเดือนที่แล้ว — บันทึกพร้อมหมายเหตุ`;
  } else {
    ttl.textContent="⚠️ วันที่ไม่ต่อเนื่องกับเดือนปัจจุบัน";
    txt.innerHTML=`รายการนี้ลงวันที่ <b>${esc(dLabel)}</b> (เดือน <b>"${esc(tgt)}"</b>) ซึ่ง<b>ไม่ต่อเนื่อง</b>กับเดือน <b>"${esc(m.label)}"</b> ที่เปิดอยู่ (ห่างกัน ${Math.abs(diff)} เดือน)<br><br>น่าจะกรอกวันที่ผิด — กรุณาตรวจวันที่บนใบเสร็จแล้วแก้ไขให้ถูกต้อง`;
    btn.style.display="none";
  }
  document.getElementById("monthGuardModal").classList.add("open");
}
function monthGuardFix(){ document.getElementById("monthGuardModal").classList.remove("open"); const fd=document.getElementById("fDate"); if(fd){ fd.focus(); } }
function monthGuardConfirm(){
  document.getElementById("monthGuardModal").classList.remove("open");
  const dateStr=document.getElementById("fDate").value;
  const diff=state._mgDiff||0;
  if(diff===-1){
    // บิลตกค้างจากเดือนที่แล้ว -> เก็บไว้เดือนนี้ + เติมหมายเหตุท้าย description
    const fd=document.getElementById("fDesc");
    if(fd && !/lacking bill/i.test(fd.value)) fd.value=(fd.value.trim()+" (Lacking bill from last month)").trim();
    state._monthGuardOk=true; saveEntry(); return;
  }
  if(diff===1){
    if(!state.editingId){
      const t=ensureMonthForDate(dateStr);
      state.activeMonthId=t.id;                   // ขึ้นเดือนใหม่ แล้วบันทึกรายการที่เดือนนั้น
      renderMonthTabs&&renderMonthTabs();
      state._monthGuardOk=true; saveEntry(); return;
    }
    // แก้ไขรายการเดิมแล้วเปลี่ยนวันที่เป็นเดือนถัดไป -> บันทึกค่าก่อน แล้วย้ายรายการไปเดือนใหม่
    const mOld=getActiveMonth(); const eid=state.editingId;
    state._monthGuardOk=true; state._mgSuppressPush=true;
    saveEntry();
    const en=mOld&&mOld.entries.find(x=>x.id===eid);

}
function movedList(){ if(!Array.isArray(state._moved)) state._moved=[]; return state._moved; }
/* ย้ายรายการไปเดือนที่ตรงกับวันที่ของมัน (ฝั่งชีต: ลบแถวเดิม + แทรกเดือนใหม่ จบใน request เดียว) */
async function moveEntryToMonth(en, fromMonth){
  const t=ensureMonthForDate(en.date);
  if(t.id===fromMonth.id) return t;
  fromMonth.entries=fromMonth.entries.filter(x=>x.id!==en.id);
  t.entries.push(en);
  t.entries.sort((a,b)=> (a.date<b.date?-1:a.date>b.date?1:(parseInt(a.docNo)||0)-(parseInt(b.docNo)||0)) );
  en._dirty=Date.now();
  movedList().push({ ts:Date.now(), monthId:fromMonth.id, sid:en.id, date:en.date, docNo:en.docNo||"", amount:en.amount||0 });
  (state._upq||[]).forEach(j=>{ if(j.entryId===en.id) j.monthId=t.id; });   // งานอัปโหลดค้างย้ายตามรายการ
  state.activeMonthId=t.id;
  saveState(); renderAll();
  toast(`➡️ ย้ายรายการไปเดือน ${t.label} แล้ว`);
  if(gsReady() && fromMonth.sheetName){
    try{ await fetch(GS.url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({action:"moveEntry", fromSheet:fromMonth.sheetName, toSheet:t.sheetName,
        key:gsRowKeyLegacy(en), sid:en.id,
        entry:{ date:en.date, docNo:en.docNo||"", desc:en.desc||"", refInv:en.refInv||"", customer:en.customer||"", vendor:en.vendor||"", amount:en.amount||0, payee:en.payee||"", sid:en.id } })}); }catch(e){ console.error(e); }
    clearTimeout(_upPullTimer); _upPullTimer=setTimeout(()=>gsPullAll(false),3000);
  }
  return t;
}

/* ── สแกนวันที่ของเดือนล่าสุด (ทำงานเมื่อกด refresh เอง) ── */
function scanLatestMonthDates(){
  if(!state.months.length) return;
  const latest=state.months.reduce((a,b)=>a.id>b.id?a:b);
  const bad=latest.entries.filter(e=>{
    if(!e.date || e.date.slice(0,7)===latest.id) return false;
    const diff=monthDiffOf(e.date, latest.id);
    if(diff===-1 && /lacking bill/i.test(e.desc||"")) return false;    // บิลตกค้างที่มีหมายเหตุแล้ว = ตั้งใจ
    return true;
  });
  if(!bad.length) return;
  document.getElementById("dsList").innerHTML=bad.map(e=>{
    const diff=monthDiffOf(e.date, latest.id);
    const tgt=monthLabelOf(+e.date.slice(0,4), +e.date.slice(5,7));
    let act;
    if(diff===1)       act=`<button class="btn btn-blue btn-xs" onclick="dsMove('${latest.id}','${e.id}')">➡️ ใช่ บิลเดือน ${esc(tgt)} — ย้ายไปเดือนนั้น</button>`;
    else if(diff===-1) act=`<button class="btn btn-out btn-xs" onclick="dsLack('${latest.id}','${e.id}')">✔️ บิลตกค้างเดือนก่อน — เติมหมายเหตุ</button>`;
    else               act=`<span style="color:var(--red);font-size:12px">เดือนไม่ต่อเนื่องกัน (ห่าง ${Math.abs(diff)} เดือน) — กรุณาตรวจสอบ</span><button class="btn btn-out btn-xs" onclick="dsEdit('${latest.id}','${e.id}')">✏️ เปิดแก้ไข</button>`;
    return `<div class="ds-row" id="ds_${e.id}"><b>${esc(fmtDateDD(e.date))}</b> · ${esc(e.desc||"(ไม่มีคำอธิบาย)")} · <b>${fmtAmt(e.amount)}</b><div class="ds-act">${act}</div></div>`;
  }).join("");
  document.getElementById("dateScanModal").classList.add("open");
}
function closeDateScan(){ document.getElementById("dateScanModal").classList.remove("open"); }
function dsFind(mid,eid){ const m=state.months.find(x=>x.id===mid); return { m, e:m&&m.entries.find(x=>x.id===eid) }; }
function dsDone(eid){ const r=document.getElementById("ds_"+eid); if(r) r.remove(); if(!document.querySelector("#dsList .ds-row")) closeDateScan(); }
async function dsMove(mid,eid){ const {m,e}=dsFind(mid,eid); if(!m||!e) return dsDone(eid); await moveEntryToMonth(e,m); dsDone(eid); }
async function dsLack(mid,eid){ const {m,e}=dsFind(mid,eid); if(!m||!e) return dsDone(eid);
  if(!/lacking bill/i.test(e.desc||"")) e.desc=((e.desc||"").trim()+" (Lacking bill from last month)").trim();

function unesc(t){return t.split('<\\/script>').join('<\/script>');}
function openApp(which){
  var id = which==='gasoline' ? 'src-gasoline' : 'src-claim';
  var html = unesc(document.getElementById(id).textContent);
  var f = document.getElementById('appFrame');
  f.srcdoc = html;
  document.getElementById('appName').textContent = which==='gasoline' ? 'Gasoline' : 'Cash Advance';
  document.getElementById('launcher').style.display='none';
  document.getElementById('appView').style.display='flex';
  try{ localStorage.setItem('suite_last', which); }catch(e){}
}
function goHome(){
  document.getElementById('appView').style.display='none';
  document.getElementById('launcher').style.display='flex';
  document.getElementById('appFrame').srcdoc='';
}
