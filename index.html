<title>Fix Cash Advance — Receipt Manager</title>
<style>
:root{
  --red:#d81f2a; --red-dk:#a8151f; --red-lt:#fde8e9;
  --ink:#1a1a1a; --mid:#555; --mute:#888; --line:#e0e0e0;
  --bg:#f0f2f5; --white:#fff;
  --green:#16a34a; --amber:#d97706; --blue:#1a56db;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--ink);min-height:100dvh;overscroll-behavior:none}

.topbar{background:var(--white);border-bottom:2px solid var(--red);
  padding:10px 16px;padding-top:calc(10px + var(--safe-top));
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  position:sticky;top:0;z-index:200;box-shadow:0 1px 8px rgba(0,0,0,.08)}
.topbar-left{display:flex;align-items:center;gap:12px;min-width:0}
.logo-mark{width:34px;height:34px;background:var(--red);border-radius:8px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-weight:800}
.app-title{font-size:14px;font-weight:800;letter-spacing:.3px;white-space:nowrap}
.app-sub{font-size:11px;color:var(--mute)}
.topbar-right{display:flex;gap:8px;align-items:center}

.btn{display:inline-flex;align-items:center;gap:6px;border:none;
  padding:9px 14px;border-radius:10px;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;-webkit-appearance:none}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.6;cursor:default}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:var(--red-dk)}
.btn-out{background:var(--white);color:var(--ink);border:1.5px solid var(--line)}
.btn-out:hover{border-color:var(--red);color:var(--red)}
.btn-ghost{background:transparent;color:var(--mid);border:1.5px solid var(--line)}
.btn-grn{background:var(--green);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-sm{padding:7px 12px;font-size:12px}
.btn-xs{padding:5px 9px;font-size:11px}

.container{max-width:1200px;margin:0 auto;padding:14px;padding-bottom:calc(90px + var(--safe-bot))}

.month-bar{background:var(--white);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;margin-bottom:14px}
.month-scroll{display:flex;overflow-x:auto;padding:6px;gap:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.month-scroll::-webkit-scrollbar{display:none}
.month-tab{flex-shrink:0;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;
  transition:all .15s;color:var(--mute);border:none;background:transparent;font-family:inherit;white-space:nowrap}
.month-tab.active{background:var(--red);color:#fff}
.month-tab:not(.active):hover{background:var(--red-lt);color:var(--red)}
.btn-addmonth{flex-shrink:0;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;color:var(--red);
  border:1.5px dashed var(--red);background:transparent;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-addmonth:hover{background:var(--red-lt)}

.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
@media(max-width:640px){.summary{grid-template-columns:repeat(2,1fr)}}
.sum-card{background:var(--white);border-radius:12px;padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sum-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mute);margin-bottom:4px}
.sum-val{font-size:18px;font-weight:800;line-height:1}
.sum-val.red{color:var(--red)}.sum-val.green{color:var(--green)}.sum-val.blue{color:var(--blue)}

.header-section{background:var(--white);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px;overflow:hidden}
.reimb-bar{background:var(--white);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-left:4px solid var(--red)}
.reimb-bar label{font-size:12.5px;font-weight:700;color:var(--ink)}
.reimb-bar input{border:none;border-bottom:2px solid var(--line);padding:6px 4px;font-size:15px;font-family:inherit;color:var(--ink);outline:none;background:transparent;transition:border-color .18s;flex:1;min-width:150px}
.reimb-bar input:focus{border-bottom-color:var(--red)}
/* ช่องวันที่ทุกจุด: กดได้ทั้งช่อง (แตะที่ไหนก็เปิดปฏิทิน) */
input[type="date"]{cursor:pointer}
input[type="date"]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.55}
.hs-head{padding:12px 16px;background:rgba(216,31,42,.04);border-bottom:1px solid var(--red-lt);
  display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer}
.hs-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--red)}
.hs-body{padding:12px 16px;display:grid;gap:10px}
.hs-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.hs-row{grid-template-columns:1fr}}
.hs-field{display:grid;gap:4px}
.hs-field label{font-size:11px;font-weight:700;color:var(--mute);text-transform:uppercase;letter-spacing:.4px}
.hs-field input{border:none;border-bottom:2px solid var(--line);padding:6px 0;font-size:14px;font-family:inherit;
  color:var(--ink);outline:none;background:transparent;transition:border-color .18s;width:100%}
.hs-field input:focus{border-bottom-color:var(--red)}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:12px}
.toolbar-left{display:flex;gap:8px;flex-wrap:wrap;align-items:center;flex:1;min-width:0}
.search-wrap{position:relative;flex:1;min-width:160px;max-width:300px}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;border-radius:10px;border:1.5px solid var(--line);
  background:var(--white);font-size:13px;font-family:inherit;outline:none;transition:border-color .18s}
.search-wrap input:focus{border-color:var(--red)}
.search-wrap .ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--mute)}

.table-wrap{background:var(--white);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow-x:auto}
.data-table{width:100%;border-collapse:collapse;min-width:860px}
.data-table thead th{padding:10px 12px;text-align:left;font-size:11px;font-weight:800;text-transform:uppercase;
  letter-spacing:.4px;color:var(--mute);border-bottom:2px solid var(--line);background:#fafafa;white-space:nowrap}
.data-table tbody td{padding:9px 12px;font-size:13px;border-bottom:1px solid #f0f0f0;vertical-align:top}
.data-table tbody tr:hover{background:#fafafa}
.data-table .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.data-table .ctr{text-align:center}
.desc-cell{max-width:280px}
.rcpt-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.rb-tax{background:#dbeafe;color:#1d4ed8}
.rb-rcpt{background:#dcfce7;color:#166534}
.rb-none{background:#f1f5f9;color:#94a3b8}
.row-actions{display:flex;gap:6px;white-space:nowrap}
.empty{padding:40px 16px;text-align:center;color:var(--mute);font-size:13px}

.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);z-index:1000;
  display:none;align-items:center;justify-content:center;padding:14px;padding-top:calc(14px + var(--safe-top));
  padding-bottom:calc(14px + var(--safe-bot))}
/* modal แจ้งเตือน/ยืนยัน ต้องลอยเหนือ modal เพิ่มรายการ (entryModal) เสมอ */
#monthGuardModal,#dateScanModal{z-index:1500}
.modal-ov.open{display:flex}
.modal-box{background:var(--white);border-radius:16px;width:100%;max-width:560px;max-height:92dvh;
  display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-box.wide{max-width:920px}
.mhead{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
.mhead h3{font-size:15px;font-weight:800}
.mbtn-close{width:32px;height:32px;border:none;background:#f1f5f9;border-radius:8px;font-size:20px;cursor:pointer;
  color:var(--mid);display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0}
.mbtn-close:hover{background:var(--red-lt);color:var(--red)}
.mbody{padding:16px 18px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mfoot{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}

.field{display:grid;gap:5px;margin-bottom:14px}
.field label{font-size:11px;font-weight:700;color:var(--mute);text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;font-size:14px;
  font-family:inherit;color:var(--ink);outline:none;background:var(--white);transition:border-color .18s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--red)}
.field textarea{min-height:64px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.row2{grid-template-columns:1fr}}
.sw{position:relative}
.sdrop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--line);
  border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:200px;overflow-y:auto;z-index:10;display:none}
.sdrop.open{display:block}
.sitem{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;font-size:13px}
.sitem:hover{background:var(--red-lt)}

.section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--mute);margin:18px 0 8px}

.rtabs{display:flex;gap:8px;margin-bottom:12px}
.rtab{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-family:inherit;
  font-size:13px;font-weight:700;cursor:pointer;color:var(--mid);transition:all .15s;text-align:center}
.rtab.active{border-color:var(--red);background:var(--red-lt);color:var(--red)}

.upzone{border:2px dashed var(--line);border-radius:12px;padding:18px;text-align:center;cursor:pointer;transition:all .18s;background:#fafafa}
.upzone:hover,.upzone.drag-over{border-color:var(--red);background:var(--red-lt)}
.up-icon{font-size:26px;margin-bottom:6px}
.up-txt{font-size:13px;font-weight:700;color:var(--mid)}
.up-sub{font-size:11px;color:var(--mute);margin-top:2px}
.up-actions{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.up-btn{padding:7px 12px;border-radius:8px;border:1.5px solid var(--line);background:#fff;font-family:inherit;
  font-size:12px;font-weight:700;cursor:pointer;color:var(--ink)}
.up-btn:hover{border-color:var(--red);color:var(--red)}
.paste-zone{margin-top:10px;border:1.5px dashed var(--line);border-radius:10px;padding:10px;text-align:center;
  font-size:12px;color:var(--mute);outline:none;cursor:text}
.thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:8px;margin-top:12px}
.thumb-wrap{position:relative;aspect-ratio:1;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#f8fafc;cursor:pointer}
.thumb-wrap img{width:100%;height:100%;object-fit:cover}
.thumb-x{position:absolute;top:2px;right:2px;width:20px;height:20px;border:none;border-radius:50%;background:rgba(216,31,42,.92);color:#fff;font-size:12px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
/* Purchase by dropdown */
.payee-dd{position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:60;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 26px rgba(0,0,0,.14);max-height:190px;overflow-y:auto}
.payee-dd .pd-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;font-size:14px;cursor:pointer;border-bottom:1px solid #f1f3f6}
.payee-dd .pd-row:last-child{border-bottom:none}
.payee-dd .pd-row:active{background:#f6f8fb}
.payee-dd .pd-x{border:none;background:none;color:var(--muted);font-size:13px;cursor:pointer;padding:4px 6px;border-radius:6px;flex:0 0 auto}
.payee-dd .pd-x:active{background:#fdecec;color:var(--red)}
.payee-dd .pd-empty{padding:10px 12px;font-size:12.5px;color:var(--muted)}
/* date-scan rows */
.ds-row{padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;font-size:13.5px;background:#fff}
.ds-row .ds-act{margin-top:7px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.thumb-del{position:absolute;top:3px;right:3px;width:20px;height:20px;border:none;border-radius:50%;
  background:rgba(0,0,0,.6);color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.pdf-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;margin-top:8px;background:#f8fafc}
.pdf-item .ic{font-size:20px}
.pdf-item .nm{flex:1;font-size:12px;font-weight:700;color:var(--ink);word-break:break-all}
.pdf-item .pg{font-size:11px;color:var(--mute)}
.pdf-item .rm{border:none;background:transparent;color:var(--mute);cursor:pointer;font-size:16px}
.pdf-item .rm:hover{color:var(--red)}

.toast{position:fixed;bottom:calc(20px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:24px;font-size:13px;font-weight:600;
  opacity:0;transition:all .25s;z-index:3000;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.exp-row{display:grid;grid-template-columns:1fr 130px 34px;gap:8px;align-items:start;margin-bottom:8px}
.exp-row textarea{min-height:42px}
.btn-xrow{border:none;background:#f1f5f9;color:var(--mute);border-radius:8px;cursor:pointer;height:40px;font-size:14px}
.btn-xrow:hover{background:var(--red-lt);color:var(--red)}
.btn-addrow{width:100%;padding:9px;border:1.5px dashed var(--line);border-radius:10px;background:transparent;
  color:var(--red);font-weight:700;font-family:inherit;font-size:12px;cursor:pointer;margin-top:4px}
.btn-addrow:hover{background:var(--red-lt)}
.type-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.type-scroll::-webkit-scrollbar{display:none}
.type-tab{flex-shrink:0;padding:6px 9px;border-radius:8px;border:1.5px solid var(--line);background:#fff;
  font-family:inherit;font-size:10.5px;font-weight:700;cursor:pointer;color:var(--mid);white-space:nowrap;letter-spacing:-.1px}
.type-tab.active{border-color:var(--red);background:var(--red-lt);color:var(--red)}

/* A4 sheets */
.a4-stage{background:#525659;border-radius:10px;padding:14px;overflow:auto;display:flex;justify-content:center;align-items:flex-start;max-height:60vh;
  width:100%;max-width:100%;min-width:0;box-sizing:border-box}   /* ล็อกความกว้าง: ไม่ให้ stage ขยายตามชีต (fitScale จะได้นิ่ง) */
.a4-stage > *{flex:0 0 auto}
/* กันคอลัมน์ grid/flex ที่ห่อ stage ไม่ให้โตเกิน track ตามเนื้อหา (สาเหตุที่ "พอดีจอ" เพี้ยน) */
.mbody div:has(> .a4-stage){min-width:0;max-width:100%;overflow:hidden}
.zoom-bar{display:flex;gap:6px;justify-content:center;align-items:center;margin-bottom:8px}
.zoom-bar button{border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:6px 12px;font-family:inherit;
  font-size:13px;font-weight:700;cursor:pointer;color:var(--ink);min-width:40px}
.zoom-bar button:active{background:var(--red-lt)}
.zoom-bar .zlabel{border:none;color:var(--mute);font-size:11px;min-width:0;cursor:default}
.a4-sheet{background:#fff;width:794px;min-height:1123px;flex:none;position:relative;box-shadow:0 4px 20px rgba(0,0,0,.3);
  transform-origin:top center;font-family:Arial,Helvetica,sans-serif;color:#111}
.a4-inner{padding:48px 54px}
.a4-hd{display:flex;align-items:flex-start;justify-content:flex-end;gap:24px;margin-bottom:18px;position:relative;min-height:62px}
.a4-title{position:absolute;left:0;right:0;top:0;text-align:center;padding-top:6px}   /* กึ่งกลางหน้ากระดาษจริง (ไม่ถูกโลโก้ดันเยื้อง) */
.a4-title .t1{display:block;font-size:18px;font-weight:800;line-height:1.25}
.a4-title .t2{display:block;font-size:15px;font-weight:700}
.a4-logo{height:62px;width:auto;flex-shrink:0;position:relative;z-index:1}   /* คงตำแหน่งเดิม (มุมขวา) */
.a4-meta{display:grid;grid-template-columns:auto 1fr auto 1fr;gap:6px 12px;font-size:14px;align-items:end;margin-bottom:8px}
.a4-meta .ml{font-weight:700}
.a4-meta .mv{border-bottom:1px solid #111;padding-bottom:2px;min-height:20px}
.a4-emp{font-size:14px;margin-bottom:14px}
.a4-emp .ev{border-bottom:1px solid #111;display:inline-block;min-width:300px;margin-left:8px;padding-bottom:2px}
.a4-tbl{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px}
.a4-tbl th,.a4-tbl td{border:1px solid #111;padding:6px 10px}
.a4-tbl th{font-weight:700;background:#fff}
.a4-tbl .amt{text-align:right;width:150px;white-space:nowrap;font-variant-numeric:tabular-nums}
.a4-tbl .tot td{font-weight:800}
.a4-tbl .tot .lbl{text-align:right;font-style:italic}
.v6-dlbl{font-size:14px;font-weight:700;margin:12px 0 2px}
.v6-lines{margin-bottom:8px}
.v6-line{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;border-bottom:1.5px dotted #888;min-height:30px;padding:5px 2px 3px}
.v6-line .v6-d{flex:1;font-size:13px;word-break:break-word;line-height:1.35}
.v6-line .v6-a{font-size:13px;white-space:nowrap;font-variant-numeric:tabular-nums;text-align:right;min-width:90px}
.v6-tot{display:flex;justify-content:flex-end;align-items:baseline;gap:28px;margin:10px 0 4px;padding-right:2px}
.v6-tot-l{font-style:italic;font-weight:800;font-size:14px}
.v6-tot-a{font-weight:800;font-size:14px;font-variant-numeric:tabular-nums;min-width:90px;text-align:right}
.a4-rcpt-lbl{font-size:12px;font-weight:700;color:#444;margin:6px 0 8px}
.rcpt-zone{position:relative;width:100%;min-height:360px;border:1px dashed #cbd5e1;border-radius:6px;background:#fcfcfc}
.rcpt-zone.flat{border:none;background:transparent;border-radius:0}
.rcpt-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:13px;pointer-events:none;text-align:center;padding:20px}
.sticker{position:absolute;border:1px solid rgba(17,24,39,.18);background:#fff;overflow:hidden;
  box-shadow:0 3px 12px rgba(0,0,0,.12);touch-action:none}
.sticker img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none}
.sticker .bar{position:absolute;left:0;top:0;right:0;height:22px;background:rgba(17,24,39,.72);color:#fff;
  display:flex;align-items:center;justify-content:space-between;padding:0 6px;font-size:11px;font-weight:700;cursor:grab;z-index:2}
.sticker .bar .x{cursor:pointer;font-size:13px}
.sticker .handle{position:absolute;right:4px;bottom:4px;width:16px;height:16px;border-radius:3px;background:var(--red);
  border:1.5px solid #fff;cursor:nwse-resize;z-index:3}
.a4-sheet.capturing .bar,.a4-sheet.capturing .handle{display:none!important}
.a4-sheet.capturing .rcpt-zone{border:none!important;background:transparent!important}
.a4-sheet.capturing .sticker{border:none!important;box-shadow:none!important}

.exp-pages{background:#525659;border-radius:10px;padding:14px;overflow:auto;max-height:62dvh;display:flex;flex-direction:column;align-items:center;gap:16px}
.exp-loading{color:#fff;font-size:13px;padding:30px;text-align:center}
.pg-port{background:#fff;width:794px;min-height:1123px;box-shadow:0 4px 20px rgba(0,0,0,.3);
  transform-origin:top center;font-family:Arial,Helvetica,sans-serif;color:#111;position:relative}
.pg-port img.full{display:block;width:100%;height:auto}
.pg-tag{position:absolute;top:6px;left:6px;background:rgba(26,86,219,.85);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;z-index:5}

/* Summary sheet (portrait) */
.cab-sheet{padding:28px 30px}
.cab-top{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:10px}
.cab-left{display:flex;flex-direction:column;align-items:flex-start}
.cab-logo{height:42px;width:auto;display:block;margin-bottom:6px}
.cab-co{font-size:16px;font-weight:800;line-height:1.3}      /* = 12 pt ใน PDF (16 x 0.7497) */
.cab-name{font-size:16px;font-weight:700;margin-top:2px}     /* = 12 pt ใน PDF */
.cab-cur{font-size:12px;font-weight:700;text-align:right;white-space:nowrap;padding-bottom:1px}
.cab-tbl{width:100%;border-collapse:collapse;font-size:9px;table-layout:fixed;border:2px solid #111}
.cab-tbl th,.cab-tbl td{border:1px solid #111;padding:2px 4px;vertical-align:middle;overflow:hidden;word-break:break-word;line-height:1.25}
.cab-tbl th{font-weight:700;text-align:center}
.cab-tbl .num{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.cab-tbl .ctr{text-align:center}
.cab-tbl .hdr td{color:var(--blue)}
.cab-tbl .hdr .amt{text-align:right;color:var(--blue);font-variant-numeric:tabular-nums}
.cab-tbl .hdr.bold td{font-weight:800}
.cab-tbl .totrow td{background:#d9e1f2;font-weight:800;border-top-width:2px;border-bottom-width:2px}
/* กรอบแถวหัวตารางหนาขึ้น */
.cab-tbl thead th{border-width:2px}
/* เส้นกรอบซ้าย-ขวา ของทั้งตารางหนาขึ้น */
.cab-tbl th:first-child,.cab-tbl td:first-child{border-left-width:2px}
.cab-tbl th:last-child,.cab-tbl td:last-child{border-right-width:2px}
/* เส้นคู่ใต้บล็อกสรุป: เส้นบน = ขอบล่างแถว Total Fix Cash Advance (1px), เว้น ~25%, เส้นล่างหนากว่า (2px) */
.cab-tbl .cab-divrow td{border:0;border-bottom:2px solid #111;border-left:2px solid #111;border-right:2px solid #111;padding:0;line-height:0;font-size:0}
.cab-dgap{height:1px;line-height:0}
.cab-sig{margin-top:18px;display:flex;justify-content:flex-end}
.cab-sig .inner{font-size:12px;text-align:left}
.cab-sig .line{display:inline-block;width:110px;border-bottom:1px solid #111;margin:0 8px}
.cab-sig .r{margin-bottom:20px}

.zoom-ov{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:4000;display:none;align-items:center;justify-content:center;padding:20px}
.zoom-ov.open{display:flex}
.zoom-ov img{max-width:100%;max-height:100%;object-fit:contain}
.zoom-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border:none;border-radius:50%;
  background:rgba(255,255,255,.15);color:#fff;font-size:24px;cursor:pointer}

.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;
  border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px}
@keyframes sp{to{transform:rotate(360deg)}}

/* ===== mobile-friendly entry cards ===== */
.card-list{display:none}
.ecard{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);
  padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:transform .08s}
.ecard:active{transform:scale(.99)}
.ec-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.ec-date{font-size:12px;font-weight:700;color:var(--mute);white-space:nowrap}
.ec-amt{font-size:18px;font-weight:800;color:var(--red);font-variant-numeric:tabular-nums;white-space:nowrap}
.ec-desc{font-size:14px;font-weight:600;margin:5px 0 4px;line-height:1.35}
.ec-meta{font-size:12px;color:var(--mid);line-height:1.4}
.ec-bot{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:8px;
  padding-top:8px;border-top:1px solid #f0f0f0}
.ec-bal{font-size:12px;font-weight:700;color:var(--green);font-variant-numeric:tabular-nums}

/* ===== contenteditable paste box ===== */
.paste-zone{min-height:44px;display:flex;align-items:center;justify-content:center;text-align:center}
.paste-zone:empty:before{content:attr(data-ph);color:var(--mute);font-size:12px;pointer-events:none}
.paste-zone:focus{border-color:var(--red);background:#fff;outline:none}
.paste-zone img{max-height:60px;border-radius:6px}

/* ===== floating action buttons (mobile speed-dial) ===== */
.fab-stack{position:fixed;right:16px;bottom:calc(16px + var(--safe-bot));z-index:300;display:none;flex-direction:column;align-items:flex-end;gap:13px}
.fab-backdrop{position:fixed;inset:0;z-index:299;background:transparent;display:none}
.fab-backdrop.show{display:block}
.fab{border:none;border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;opacity:.4;
  transition:transform .18s ease, box-shadow .18s ease, opacity .18s ease;-webkit-tap-highlight-color:transparent}
.fab svg{width:22px;height:22px;display:block;transition:transform .28s ease}
.fab:active{transform:scale(.9);opacity:1}
.fab-stack.open .fab{opacity:1}
.fab-main{width:60px;height:60px;background:linear-gradient(145deg,#ef4b57,#cf1420);box-shadow:0 8px 20px rgba(207,20,32,.42),0 2px 5px rgba(0,0,0,.14)}
.fab-main svg{width:26px;height:26px}
.fab-stack.open .fab-main svg{transform:rotate(135deg)}      /* + → × ตอนกางเมนู */
.fab-mini{width:50px;height:50px}
.fab-pull{background:linear-gradient(145deg,#4a92fd,#1667e0);box-shadow:0 7px 16px rgba(22,103,224,.4),0 2px 4px rgba(0,0,0,.12)}
.fab-push{background:linear-gradient(145deg,#1cbe7e,#0a9257);box-shadow:0 7px 16px rgba(10,146,87,.4),0 2px 4px rgba(0,0,0,.12)}
.fab-add{background:linear-gradient(145deg,#ef4b57,#cf1420);box-shadow:0 7px 16px rgba(207,20,32,.4),0 2px 4px rgba(0,0,0,.12)}
.fab-transfer{background:linear-gradient(145deg,#f5a623,#d97d00);box-shadow:0 7px 16px rgba(217,125,0,.4),0 2px 4px rgba(0,0,0,.12)}
.fab-row{display:flex;align-items:center;gap:10px;opacity:0;transform:translateY(16px) scale(.6);pointer-events:none;
  transition:opacity .2s ease, transform .22s cubic-bezier(.34,1.56,.64,1)}
.fab-stack.open .fab-row{opacity:1;transform:none;pointer-events:auto}
.fab-stack.open .fab-row:nth-last-of-type(1){transition-delay:.03s}
.fab-stack.open .fab-row:nth-last-of-type(2){transition-delay:.07s}
.fab-stack.open .fab-row:nth-last-of-type(3){transition-delay:.11s}
.fab-stack.open .fab-row:nth-last-of-type(4){transition-delay:.15s}
.fab-label{background:rgba(23,25,35,.9);color:#fff;font-size:12px;font-weight:600;letter-spacing:.2px;padding:6px 11px;border-radius:9px;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,.2)}
.fab.spin svg{animation:fabspin .8s linear infinite}
@keyframes fabspin{to{transform:rotate(360deg)}}

@media(max-width:720px){
  .container{padding:10px;padding-bottom:calc(100px + var(--safe-bot))}
  .table-wrap{display:none}
  .card-list{display:block}
  .fab-stack{display:flex}
  .toolbar > .btn-red{display:none}            /* use the FAB instead */
  .search-wrap{max-width:none}
  /* prevent iOS zoom-on-focus: inputs must be >=16px */
  .field input,.field select,.field textarea,.hs-field input,.search-wrap input,.exp-row input,.exp-row textarea{font-size:16px}
  /* roomier tap targets */
  .btn{padding:11px 16px}.btn-sm{padding:9px 13px}.btn-xs{padding:8px 11px}
  .month-tab{padding:10px 18px}
  .rtab{padding:13px 10px}
  .mbtn-close{width:38px;height:38px}
  .modal-box{max-width:100%;border-radius:16px 16px 0 0;max-height:94dvh}
  .modal-ov{align-items:flex-end;padding:0}
  .mhead,.mbody,.mfoot{padding-left:16px;padding-right:16px}
  .mfoot{position:sticky;bottom:0;background:#fff}
  .cb-right .btn-sm{flex:1}
  .summary{gap:8px}
  .sum-val{font-size:16px}
}
@media(max-width:380px){
  .ec-amt{font-size:16px}
  .sum-card{padding:10px}
}
.mg-list{display:flex;flex-direction:column;gap:6px}
.mg-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px}
.mg-item.core{background:#fafafa}
.mg-tag{font-size:10px;color:var(--mute);font-weight:700}
.mg-del{border:none;background:#fdecee;color:var(--red);border-radius:6px;padding:6px 12px;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px}
.mg-del:active{background:#f8d7da}
.mg-empty{color:var(--mute);font-size:13px;padding:6px}
@media print{
  body *{visibility:hidden}
  #printArea,#printArea *{visibility:visible}
  #printArea{position:absolute;left:0;top:0;width:100%}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">S</div>
    <div>
      <div class="app-title">Fix Cash Advance</div>
      <div class="app-sub">Receipt &amp; Reimbursement Manager</div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn btn-red btn-sm" onclick="openExport()">👁 Preview</button>
  </div>
</header>

<div class="container">
  <div class="month-bar"><div class="month-scroll" id="monthScroll"></div></div>
  <div class="cloud-bar" id="cloudBar">
    <div class="cb-left"><span class="cb-dot" id="cbDot"></span><span id="cbStatus">โหมดออฟไลน์ — ยังไม่เชื่อม Google Sheet</span></div>
    <div class="cb-right">
      <button class="btn btn-out btn-sm" id="cbSettings" onclick="openSettings()">⚙️ Google Sync</button>
    </div>
  </div>

  <div class="modal-ov" id="settingsModal" onclick="if(event.target===this)closeSettings()">
    <div class="modal-box" style="max-width:420px">
      <div class="mhead"><h3 style="margin:0">⚙️ Google Sync</h3><button class="mbtn-close" onclick="closeSettings()">✕</button></div>
      <div class="mbody">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><span class="cb-dot" id="cbDot2"></span><span id="cbStatus2" style="font-size:13px;color:var(--muted)">—</span></div>
        <div class="section-title" style="margin-top:0">ทำด้วยตนเอง</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn btn-out" id="cbPull" onclick="gsPullAll(true)">⤓ ดึงจาก Google Sheet</button>
          <button class="btn btn-out" id="cbPush" onclick="gsPushMonth()">⤒ Push เดือนนี้</button>
          <button class="btn btn-out" id="cbUpload" onclick="gsUploadMonth()">☁️ อัปไฟล์ขึ้น Drive</button>
        </div>
        <label class="cb-auto" id="cbAutoWrap" style="margin-top:14px;display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" id="cbAuto" onchange="gsToggleAuto()"> auto-sync (ดึงอัตโนมัติทุก 20 วิ)</label>
        <div class="section-title" style="margin-top:16px">🔍 ตรวจใบเสร็จ (Sync)</div>
        <button class="btn btn-out btn-sm" onclick="diagnoseReceipts()" style="margin-bottom:6px">ตรวจว่ารายการไหนใบเสร็จหาย + ลองจับคืน</button>
        <div id="rcptDiag" style="max-height:240px;overflow-y:auto;font-size:12.5px"></div>
        <div class="section-title" style="margin-top:16px">🗑 รายการที่ลบ (กู้คืนได้)</div>
        <div id="trashList" style="max-height:220px;overflow-y:auto"></div>
        <p style="font-size:12px;color:var(--muted);margin-top:12px;line-height:1.5">💡 เมื่อกด <b>Save</b> รายการ ระบบจะ <b>Push เดือนนี้ + อัปไฟล์ขึ้น Drive</b> ให้อัตโนมัติแล้ว — ปกติไม่ต้องกดปุ่มพวกนี้เอง</p>
      </div>
    </div>
  </div>

  <div class="summary" id="summary"></div>

  <div class="header-section">
    <div class="hs-head" onclick="toggleHeader()">
      <span class="hs-title">Fix Cash Advance — Header</span>
      <span id="hsToggle" style="font-size:12px;color:var(--mute);font-weight:700">▾ details</span>
    </div>
    <div class="hs-body" id="hsBody" style="display:none">
      <div class="hs-row">
        <div class="hs-field"><label>1st Fix CA</label><input id="hCa1" type="number" oninput="onHeader()"></div>
        <div class="hs-field"><label>1st Fix CA date</label><input id="hCa1Date" type="date" onchange="onHeader()"></div>
      </div>
      <div class="hs-row">
        <div class="hs-field"><label>2nd Fix CA</label><input id="hCa2" type="number" oninput="onHeader()"></div>
        <div class="hs-field"><label>2nd Fix CA date</label><input id="hCa2Date" type="date" onchange="onHeader()"></div>
      </div>
      <div class="hs-row">
        <div class="hs-field"><label>Balance Fix CA <span style="color:var(--muted);font-weight:400">(← Cash Balance เดือนก่อน)</span></label><input id="hCaBal" type="number" oninput="onHeader()"></div>
        <div class="hs-field"><label>Balance Fix CA date <span style="color:var(--muted);font-weight:400">(← วันที่รายการสุดท้ายเดือนก่อน)</span></label><input id="hCaBalDate" type="date" onchange="onHeader()"></div>
      </div>
      <div class="hs-row">
        <div class="hs-field"><label>Reimbursement amount <span style="color:var(--muted);font-weight:400">(← Total Spent เดือนก่อน · อัตโนมัติ)</span></label><input id="hReimbAmt" type="number" oninput="onHeader()"></div>
        <div class="hs-field"></div>
      </div>
    </div>
  </div>

  <div class="reimb-bar">
    <label for="hReimbDate">🗓️ Reimbursement date <span style="color:var(--muted);font-weight:400">(วันที่ได้รับเงินโอนเข้าบัญชี — กรอกเอง)</span></label>
    <input id="hReimbDate" type="date" onchange="onHeader()">
  </div>

  <div class="toolbar">
    <div class="toolbar-left">
      <div class="search-wrap">
        <span class="ic">🔍</span>
        <input id="search" type="text" placeholder="Search description / vendor / customer…" oninput="renderTable()">
      </div>
    </div>
    <button class="btn btn-red" onclick="openAddEntry()">＋ Add Entry</button>
  </div>

  <div class="table-wrap">
    <table class="data-table">
      <thead><tr>
        <th>Date</th><th>Doc No.</th><th>Descriptions</th><th>Ref. Inv</th>
        <th>Customer</th><th>Vendor Name</th><th class="num">Amount</th>
        <th class="num">Cash Balance</th><th class="ctr">Receipt</th><th></th>
      </tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="card-list" id="cardList"></div>
</div>

<div class="modal-ov" id="monthGuardModal">
  <div class="modal-box" style="max-width:380px">
    <div class="mhead"><h3 style="margin:0" id="mgTitle">⚠️ วันที่ไม่ตรงกับเดือนนี้</h3></div>
    <div class="mbody">
      <p id="mgText" style="font-size:14px;line-height:1.65;margin:0 0 6px"></p>
      <p style="font-size:12.5px;color:var(--muted);margin:0">กรุณาตรวจ<b>วันที่บนใบเสร็จ</b>อีกครั้งก่อนบันทึก</p>
    </div>
    <div class="mfoot" style="flex-direction:column;gap:8px;align-items:stretch">
      <button class="btn btn-red" onclick="monthGuardFix()">🔙 กลับไปแก้วันที่</button>
      <button class="btn btn-out" id="mgConfirmBtn" onclick="monthGuardConfirm()"></button>
    </div>
  </div>
</div>

<div class="modal-ov" id="dateScanModal">
  <div class="modal-box" style="max-width:420px">
    <div class="mhead"><h3 style="margin:0">🔎 ตรวจพบวันที่ไม่ตรงเดือน</h3><button class="mclose" onclick="closeDateScan()">✕</button></div>
    <div class="mbody">
      <p style="font-size:13px;color:var(--muted);margin:0 0 10px">รายการต่อไปนี้ในเดือนล่าสุด ลงวันที่ไม่ตรงกับเดือนของชีต — กรุณาตรวจสอบทีละรายการ</p>
      <div id="dsList"></div>
    </div>
    <div class="mfoot"><button class="btn btn-out" onclick="closeDateScan()">ปิด — ปล่อยไว้ก่อน</button></div>
  </div>
</div>

<div class="modal-ov" id="transferModal">
  <div class="modal-box" style="max-width:430px">
    <div class="mhead"><h3 style="margin:0">💸 เช็คลิสต์การโอนเงิน</h3><button class="mclose" onclick="closeTransferModal()">✕</button></div>
    <div class="mbody">
      <div id="trPending"></div>
      <div id="trPaid" style="margin-top:14px"></div>
      <p style="font-size:11.5px;color:var(--muted);margin:10px 0 0">รายการเข้าลิสต์อัตโนมัติเมื่อบันทึกรายการที่ระบุ Purchase by · กด "โอนแล้ว" ได้ทั้งที่นี่และปุ่มในข้อความ LINE</p>
    </div>
    <div class="mfoot"><button class="btn btn-out" onclick="closeTransferModal()">ปิด</button></div>
  </div>
</div>

<div class="fab-backdrop" id="fabBackdrop" onclick="closeFabDial()"></div>
<div class="fab-stack" id="fabStack">
  <div class="fab-row">
    <span class="fab-label">ดึงจาก Sheet</span>
    <button class="fab fab-mini fab-pull" id="fabPull" onclick="gsPullAll(true);closeFabDial()" aria-label="ดึงจาก Google Sheet">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
    </button>
  </div>
  <div class="fab-row">
    <span class="fab-label">Push + อัปไฟล์</span>
    <button class="fab fab-mini fab-push" id="fabPush" onclick="gsPushUploadNow();closeFabDial()" aria-label="Push เดือนนี้ + อัปไฟล์ขึ้น Drive">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 18a4 4 0 0 1-.55-7.97 5 5 0 0 1 9.74-1.32A3.5 3.5 0 0 1 17.5 18H7z"/><path d="M12 18v-6M9.6 14.2 12 11.8l2.4 2.4"/></svg>
    </button>
  </div>
  <div class="fab-row">
    <span class="fab-label" id="fabTransferLabel">เช็คลิสต์โอนเงิน</span>
    <button class="fab fab-mini fab-transfer" id="fabTransfer" onclick="openTransferModal();closeFabDial()" aria-label="เช็คลิสต์การโอนเงิน">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.6"/><path d="M6 12h.01M18 12h.01"/></svg>
    </button>
  </div>
  <div class="fab-row">
    <span class="fab-label">เพิ่มรายการ</span>
    <button class="fab fab-mini fab-add" id="fabAdd" onclick="openAddEntry();closeFabDial()" aria-label="เพิ่มรายการ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M12 12v5M9.5 14.5h5"/></svg>
    </button>
  </div>
  <button class="fab fab-main" id="fabMain" onclick="toggleFabDial()" aria-label="เมนูการทำงาน">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</div>


<!-- ENTRY MODAL -->
<div class="modal-ov" id="entryModal">
  <div class="modal-box">
    <div class="mhead"><h3 id="entryTitle">Add Entry</h3><button class="mbtn-close" onclick="closeEntry()">×</button></div>
    <div class="mbody">
      <div class="row2">
        <div class="field"><label>Date</label><input id="fDate" type="date" onchange="onDateChange()"></div>
        <div class="field"><label>Doc No.</label><input id="fDoc" type="text" placeholder="auto"></div>
      </div>
      <div class="field"><label>Descriptions</label><textarea id="fDesc" placeholder="Description of expense…"></textarea></div>
      <div class="row2">
        <div class="field"><label>Ref. Inv</label><input id="fRef" type="text"></div>
        <div class="field"><label>Customer</label><input id="fCustomer" list="customerList" type="text" autocomplete="off" placeholder="เลือกหรือพิมพ์ชื่อลูกค้า"><datalist id="customerList"></datalist></div>
      </div>
      <div class="row2">
        <div class="field"><label>Vendor Name</label>
          <div class="sw">
            <input id="fVendor" type="text" autocomplete="off" oninput="vendorInput()" onfocus="vendorFocus()" onblur="vendorBlur()">
            <div class="sdrop" id="vendorDrop"></div>
          </div>
        </div>
        <div class="field"><label>Amount (THB)</label><input id="fAmount" type="number" step="0.01" placeholder="ใส่ - สำหรับคืนสินค้า เช่น -100"></div>
        <div class="field"><label>Purchase by <span style="font-weight:400;color:var(--muted)">(จ่ายไปก่อน — ต้องโอนเงินคืนให้)</span></label>
          <div style="position:relative">
            <input id="fPayee" type="text" autocomplete="off" placeholder="ชื่อคนที่สำรองจ่าย (เว้นว่างได้)" onfocus="openPayeeDD()" oninput="renderPayeeDD()">
            <button type="button" id="payeeCaret" onclick="togglePayeeDD(event)" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);border:none;background:none;font-size:12px;color:var(--muted);cursor:pointer;padding:6px">▼</button>
            <div id="payeeDD" class="payee-dd" style="display:none"></div>
          </div>
        </div>
      </div>
      <button type="button" class="btn btn-ghost btn-xs" style="margin:2px 0 0;align-self:flex-start" onclick="openManage()">⚙️ จัดการชื่อ Customer / Vendor</button>

      <div class="section-title">Receipt / Attachment</div>
      <div class="rtabs">
        <button class="rtab" id="rtTax" onclick="setRcptKind('tax')">📄 ใบกำกับภาษี</button>
        <button class="rtab" id="rtRcpt" onclick="setRcptKind('receipt')">🧾 ใบเสร็จ</button>
      </div>

      <!-- TAX -->
      <div id="taxSection" style="display:none">
        <div class="upzone" id="taxUpzone">
          <input type="file" id="taxFileIn" accept="image/*,application/pdf" multiple style="display:none">
          <div class="up-icon">📷</div>
          <div class="up-txt">แนบใบกำกับภาษี (รูป หรือ PDF)</div>
          <div class="up-sub">รูป → แนบได้หลายรูป (1 รูป = 1 หน้า A4) · PDF → แนบไฟล์จริงต่อท้าย</div>
          <div class="up-actions" onclick="event.stopPropagation()">
            <button class="up-btn" onclick="document.getElementById('taxFileIn').click()">📂 Browse</button>
            <button class="up-btn" onclick="pasteTax()">📋 Paste รูป</button>
          </div>
        </div>
        <div class="paste-zone" id="taxPaste" contenteditable="true" data-ph="📋 แตะที่นี่ แล้วแตะค้าง → เลือก ‘วาง / Paste’ (มือถือ) หรือ Ctrl+V (คอม)" onpaste="taxPasteEvent(event)"></div>
        <div id="taxPageBox" style="display:none;margin-top:12px">
          <div style="font-size:12px;color:var(--green);font-weight:700;margin-bottom:8px">✓ จัดวางรูปบนหน้า A4 แล้ว</div>
          <div class="thumbs"><div class="thumb-wrap" onclick="zoomImg(state.taxPage)"><img id="taxPageThumb" src="" alt=""></div></div>
          <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
            <button class="btn btn-out btn-sm" onclick="openTaxBuilder()">✏️ แก้ไขการจัดวาง</button>
            <button class="btn btn-ghost btn-sm" onclick="clearTaxPage()">🗑 ลบรูป A4</button>
          </div>
        </div>
        <div id="taxImgList" class="thumbs" style="margin-top:10px"></div>
        <div id="taxPdfList"></div>
      </div>

      <!-- RECEIPT v6 -->
      <div id="rcptSection" style="display:none">
        <div id="rcptHasPage" style="display:none">

function uid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }

function isDeduct(n){ return (parseFloat(n)||0)<0; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c])); }
function fmtDateDD(d){ if(!d) return ""; const p=d.split("-"); if(p.length<3) return d; return p[2]+"-"+p[1]+"-"+p[0].slice(2); }
/* แปลงวันที่ระหว่างรูปแบบเก็บ "2026.04.28" (จุด) กับรูปแบบ input calendar "2026-04-28" (ISO) */
function dotToISO(s){ if(!s) return ""; const t=String(s).trim().replace(/[.\/]/g,"-"); const p=t.split("-"); if(p.length<3) return ""; const y=p[0], mo=("0"+p[1]).slice(-2), d=("0"+p[2]).slice(-2); return (y.length===4)?`${y}-${mo}-${d}`:""; }
function isoToDot(s){ if(!s) return ""; const p=String(s).trim().split("-"); if(p.length<3) return String(s); return `${p[0]}.${p[1]}.${p[2]}`; }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2400); }
function dataUrlToU8(d){ const b=atob(d.split(",")[1]); const u=new Uint8Array(b.length); for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i); return u; }
function compressImg(dataUrl, cb, maxDim=1600, q=0.82){
  const img=new Image();
  img.onload=()=>{ try{ let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
    const s=Math.min(1, maxDim/Math.max(w,h)); w=Math.round(w*s); h=Math.round(h*s);
    const c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h);
    cb(c.toDataURL("image/jpeg",q)); }catch(e){ cb(dataUrl); } };
  img.onerror=()=>cb(dataUrl); img.src=dataUrl;
}

/* สร้าง header เดือนใหม่โดยดึงค่าจากเดือนก่อนตามกฎ:
   - Balance Fix CA: date = วันที่รายการสุดท้ายเดือนก่อน, เงิน = Cash Balance คงเหลือเดือนก่อน
   - Reimbursement: เงิน = Total Spent เดือนก่อน, date = เว้นว่าง (กรอกเอง)
   ค่าอื่น (ca1/ca2) สืบทอดจากเดือนก่อน */
function newMonthHeaderFrom(prev){
  const base={ca1:25000,ca1Date:"",ca2:25000,ca2Date:"",caBal:0,caBalDate:"",caReimbAmt:0,caReimbDate:""};
  if(!prev) return base;
  const h={...prev.header};
  const spent=(prev.entries||[]).reduce((s,en)=>s+(parseFloat(en.amount)||0),0);
  const lastEntry=(prev.entries||[]).filter(e=>e.date).sort((a,b)=> a.date<b.date?-1:a.date>b.date?1:0).slice(-1)[0];
  h.caBal = TOTAL_IN_HAND - spent;                          // Cash Balance คงเหลือของเดือนก่อน
  h.caBalDate = lastEntry ? lastEntry.date.replace(/-/g,".") : (h.caBalDate||"");  // วันที่รายการสุดท้ายเดือนก่อน
  h.caReimbAmt = spent;                                     // Total Spent เดือนก่อน
  h.caReimbDate = "";                                       // เว้นว่างให้กรอกวันที่เอง
  return h;
}
function addMonth(){
  let y=2026,mo=6;
  if(state.months.length){ const last=state.months[state.months.length-1]; y=last.year; mo=last.month+1; if(mo>12){mo=1;y++;} }
  const id=`${y}-${String(mo).padStart(2,"0")}`;
  if(state.months.find(x=>x.id===id)){ toast("มีเดือนนี้แล้ว"); return; }
  const prev=state.months[state.months.length-1];
  const m={id,label:`${MONTH_NAMES[mo-1].slice(0,3)} ${String(y).slice(2)}`,year:y,month:mo,
    sheetName:`${MONTH_NAMES[mo-1]}${String(y).slice(2)}`,   // เช่น June26 — ให้ push สร้างชีตได้
    header:newMonthHeaderFrom(prev),
    entries:[]};
  state.months.push(m); state.activeMonthId=id; saveState(); renderAll(); toast("เพิ่มเดือนแล้ว: "+m.label);
}

/* ═══════ HEADER ═══════ */
function toggleHeader(){ const b=document.getElementById("hsBody"); const open=b.style.display!=="none";
  b.style.display=open?"none":"grid"; document.getElementById("hsToggle").textContent=open?"▾ details":"▴ hide"; }
function loadHeader(){ const m=getActiveMonth(); if(!m) return; const h=m.header;
  hCa1.value=h.ca1??""; hCa1Date.value=dotToISO(h.ca1Date); hCa2.value=h.ca2??""; hCa2Date.value=dotToISO(h.ca2Date);
  hCaBal.value=h.caBal??""; hCaBalDate.value=dotToISO(h.caBalDate); hReimbAmt.value=h.caReimbAmt??""; hReimbDate.value=dotToISO(h.caReimbDate); }
function onHeader(){ const m=getActiveMonth(); if(!m) return; const h=m.header;
  h.ca1=parseFloat(hCa1.value)||0; h.ca1Date=isoToDot(hCa1Date.value); h.ca2=parseFloat(hCa2.value)||0; h.ca2Date=isoToDot(hCa2Date.value);
  h.caBal=parseFloat(hCaBal.value)||0; h.caBalDate=isoToDot(hCaBalDate.value); h.caReimbAmt=parseFloat(hReimbAmt.value)||0; h.caReimbDate=isoToDot(hReimbDate.value);
  saveState(); scheduleHeaderPush(m); }
let _hdrPushT=null;
function scheduleHeaderPush(m){
  if(!gsReady() || !m || !m.sheetName) return;
  clearTimeout(_hdrPushT);
  _hdrPushT=setTimeout(()=>gsPushHeader(m), 1200);   // รอ 1.2 วิ หลังหยุดแก้ แล้วค่อยซิงค์ขึ้นชีต
}
async function gsPushHeader(m){
  if(!gsReady() || !m || !m.sheetName) return;
  try{
    await fetch(GS.url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({action:"pushHeader", sheetName:m.sheetName, header:m.header})});
    toast("✓ อัปเดตหัวตารางขึ้นชีตแล้ว");
  }catch(e){ console.error("pushHeader",e); }
}

/* เติมยอดหัวตารางจากเดือนก่อนให้ทุกเดือนอัตโนมัติ (เรียกตอนดึงจาก Sheet)
   - Balance Fix CA = Cash Balance เดือนก่อน, date = วันที่รายการสุดท้ายเดือนก่อน
   - Reimbursement amount = Total Spent เดือนก่อน
   - ไม่แตะ Reimbursement date (ผู้ใช้กรอกเอง) */
function autoDeriveAllHeaders(){
  const ms=[...state.months].sort((a,b)=>a.id<b.id?-1:1);
  for(let i=1;i<ms.length;i++){
    const prev=ms[i-1], cur=ms[i];
    const d=newMonthHeaderFrom(prev);
    if(!cur.header) cur.header={};
    cur.header.caBal=d.caBal;
    cur.header.caBalDate=d.caBalDate;
    cur.header.caReimbAmt=d.caReimbAmt;
    // caReimbDate คงไว้
  }
  loadHeader();
}

function entryHasRcpt(en){ return (en.rcptKind==="tax"&&((en.taxPdfs&&en.taxPdfs.length)||(en.taxImgs&&en.taxImgs.length)||en.taxPage)) || (en.rcptKind==="receipt"&&en.receiptPage); }
function updateSummary(){
  const m=getActiveMonth(); if(!m) return;
  const spent=m.entries.reduce((s,en)=>s+(parseFloat(en.amount)||0),0);
  const bal=TOTAL_IN_HAND-spent;
  const withR=m.entries.filter(entryHasRcpt).length;
  document.getElementById("summary").innerHTML=`
    <div class="sum-card"><div class="sum-label">Entries</div><div class="sum-val">${m.entries.length}</div></div>
    <div class="sum-card"><div class="sum-label">Total Spent</div><div class="sum-val red">${fmt(spent)}</div></div>
    <div class="sum-card"><div class="sum-label">Cash Balance</div><div class="sum-val green">${fmt(bal)}</div></div>
    <div class="sum-card"><div class="sum-label">With Receipt</div><div class="sum-val blue">${withR}/${m.entries.length}</div></div>`;
}

      <td class="num">${fmtAmt(en.amount)}</td><td class="num">${en.balance!=null?fmt(en.balance):""}</td>
      <td class="ctr">${rcptBadge(en)}</td>
      <td><div class="row-actions"><button class="btn btn-out btn-xs" onclick="openEditEntry('${en.id}')">✏️</button></div></td>
    </tr>`;
  }).join("");
  if(cl) cl.innerHTML=rows.map(en=>`
    <div class="ecard" onclick="openEditEntry('${en.id}')"${isDeduct(en.amount)?' style="color:#c0392b"':''}>
      <div class="ec-top"><span class="ec-date">${esc(fmtDateDD(en.date))}${en.docNo?` · #${esc(en.docNo)}`:""}</span><span class="ec-amt">${fmtAmt(en.amount)}</span></div>
      <div class="ec-desc">${esc(en.desc||"(ไม่มีคำอธิบาย)")}</div>
      <div class="ec-meta">${[en.customer,en.vendor,en.refInv?("Ref "+en.refInv):""].filter(Boolean).map(esc).join(" · ")}${en.payee?`<span style="color:#7a5c00;background:#fff7dd;border-radius:6px;padding:1px 6px;margin-left:6px;font-size:11px">💸 ${esc(en.payee)}</span>`:""}</div>
      <div class="ec-bot"><span class="ec-bal">คงเหลือ ${en.balance!=null?fmt(en.balance):"—"}</span>${rcptBadge(en)}</div>
    </div>`).join("");
}
function rcptBadge(en){
  const df=en.driveFiles||[];
  const cloud=df.length?` <span class="rcpt-badge" style="background:#e8f0fe;color:#1a73e8">☁️${df.length}</span>`:"";
  let b=`<span class="rcpt-badge rb-none">— none</span>`;
  if(en.rcptKind==="tax"){
    const localN=(en.taxPage?1:0)+((en.taxPdfs&&en.taxPdfs.length)||0)+((en.taxImgs&&en.taxImgs.length)||0);
    const driveN=df.filter(x=>x.kind==="tax"||x.kind==="taxpdf").length;
    const n=localN||driveN; if(n) b=`<span class="rcpt-badge rb-tax">📄 ${n}</span>`;
  } else if(en.rcptKind==="receipt"){
    if(en.receiptPage||df.some(x=>x.kind==="receipt")) b=`<span class="rcpt-badge rb-rcpt">🧾 A4</span>`;
  }
  return b+cloud;
}

function openManage(){ renderManage(); document.getElementById("manageModal").classList.add("open"); }

function renderManage(){
  const cc=new Set(CUSTOMERS), vc=new Set(VENDORS_CORE);
  const row=(type,name,core)=>`<div class="mg-item${core?' core':''}"><span>${esc(name)}${core?' <span class="mg-tag">(เริ่มต้น)</span>':''}</span><button class="mg-del" data-t="${type}" data-n="${esc(name)}">ลบ</button></div>`;
  const cl=allCustomers(), vl=allVendors();
  document.getElementById("mgCustomers").innerHTML=cl.length?cl.map(n=>row("c",n,cc.has(n))).join(""):'<div class="mg-empty">— ไม่มี —</div>';
  document.getElementById("mgVendors").innerHTML=vl.length?vl.map(n=>row("v",n,vc.has(n))).join(""):'<div class="mg-empty">— ไม่มี —</div>';
  document.querySelectorAll("#manageModal .mg-del").forEach(b=>{ b.onclick=()=>delOption(b.getAttribute("data-t"), b.getAttribute("data-n")); });
}
function delOption(type,name){
  if(type==="c"){
    if((state.customers||[]).includes(name)) state.customers=state.customers.filter(x=>x!==name);
    else { state.hiddenCustomers=state.hiddenCustomers||[]; if(!state.hiddenCustomers.includes(name)) state.hiddenCustomers.push(name); }
    populateCustomers();
  } else {
    if((state.vendors||[]).includes(name)) state.vendors=state.vendors.filter(x=>x!==name);
    else { state.hiddenVendors=state.hiddenVendors||[]; if(!state.hiddenVendors.includes(name)) state.hiddenVendors.push(name); }
  }
  saveState(); renderManage();
}

      state._mgSuppressPush=false;

      gsSyncEntryFiles(m, ent, oldKey, oldDrive, pendDel);
    } else {
    toast("✓ บันทึกแล้ว — กำลังซิงค์ขึ้น Google…");
    // อัปไฟล์เข้า Drive ก่อน แล้ว push เดือนนี้ขึ้นชีต อัตโนมัติ (กันลืม/ทำซ้ำ)
    (async()=>{
      try{ await gsSyncEntryFiles(m, ent, oldKey, oldDrive, pendDel); }catch(e){ console.error(e); }
      await gsPushMonthCore(true);
    })();
    }
  } else {
    toast("✓ บันทึกแล้ว");

  }
}

function tombstoneMatch(pe,t){
  if(t.sid && pe.sid && t.sid===pe.sid) return true;
  const ek=`${pe.date}|${String(pe.docNo||"").trim()}|${Math.round((parseFloat(pe.amount)||0)*100)}`;
  const tk=`${t.date}|${String(t.docNo||"").trim()}|${Math.round((parseFloat(t.amount)||0)*100)}`;
  return ek===tk;
}
function restoreTrashItem(idx){
  const t=trashList()[idx]; if(!t) return;
  const m=ensureMonthForDate((t.date||"2026-01-01"));
  const tgt = state.months.find(x=>x.id===t.monthId) || m;
  const en = t.entry ? JSON.parse(JSON.stringify(t.entry)) :
    { id:t.sid||uid(), createdAt:++_seq, date:t.date, docNo:t.docNo, desc:t.desc, refInv:t.refInv,
      customer:t.customer, vendor:t.vendor, amount:t.amount, payee:t.payee||"", balance:0,
      rcptKind:"none", taxPdfs:[], taxImgs:[], taxPage:null, taxMeta:null, receiptPage:null, receiptMeta:null, driveFiles:[] };
  const dup=tgt.entries.some(x=>x.id===en.id || entryKey(x)===entryKey(en));
  if(!dup){ tgt.entries.push(en); tgt.entries.sort((a,b)=> (a.date===b.date? String(a.docNo).localeCompare(String(b.docNo),undefined,{numeric:true}) : (a.date<b.date?-1:1))); recalcBalances(tgt); }
  state.trash=trashList().filter((_,i)=>i!==idx);
  saveState(); renderAll(); renderTrashList();
  toast(`✓ กู้คืน "${(t.desc||"").slice(0,24)}" กลับเดือน ${tgt.label} แล้ว`);

    (async()=>{ try{ await fetch(GS.url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({action:"restoreEntry", sheetName:tgt.sheetName,
        entry:{ sid:en.id, date:en.date, docNo:en.docNo||"", desc:en.desc||"", refInv:en.refInv||"", customer:en.customer||"", vendor:en.vendor||"", amount:en.amount||0, payee:en.payee||"" }})}); }catch(e){ console.error(e); }
      clearTimeout(_upPullTimer); _upPullTimer=setTimeout(()=>gsPullAll(false),3000); })();

async function purgeTrashItem(idx){
  const t=trashList()[idx]; if(!t) return;
  const nDrive=(t.entry&&t.entry.driveFiles||[]).length;
  if(!confirm(`ลบถาวร "${(t.desc||"").slice(0,30)}"?`+(nDrive?`\n(ไฟล์บน Drive ${nDrive} รายการจะถูกลบด้วย)`:"")+"\n\nกู้คืนไม่ได้อีก")) return;
  if(gsReady()){
    if(t.entry) for(const o of (t.entry.driveFiles||[])){ if(o.fileId){ try{ await gsDeleteDriveFile(o.fileId,o.month||t.monthId,o.key,o.kind,o.name); }catch(e){} } }
    try{ await fetch(GS.url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({action:"purgeTrash", sid:t.sid||"", key:t.key||""})}); }catch(e){ console.error(e); }
  }
  state.trash=trashList().filter((_,i)=>i!==idx);

/* ตรวจสอบว่ารายการที่ควรมีใบเสร็จ แต่ดึงไฟล์มาไม่เจอ + ไฟล์กำพร้าบนชีตที่ไม่มีรายการจับ */
function diagnoseReceipts(){
  const box=document.getElementById("rcptDiag"); if(!box) return;
  const m=getActiveMonth(); if(!m){ box.innerHTML="ยังไม่มีเดือน"; return; }
  const files=(_serverFiles||[]).filter(f=>f.month===m.id);
  if(!files.length){ box.innerHTML="ยังไม่ได้ดึงข้อมูลไฟล์จากชีต — กด 🔵 ดึง ก่อน"; return; }
  // คีย์ทั้งหมดที่รายการในเดือนนี้ครอบครอง (variant รวม)
  const claimed=new Set();
  m.entries.forEach(e=>{ (e.driveFiles||[]).forEach(f=> claimed.add(f.fileId)); });
  const mainKinds=new Set(["receipt","tax","taxpdf","taximg"]);
  // 1) รายการที่มี rcptKind แต่ไม่มีไฟล์ใบเสร็จหลักติดมา
  const missing=m.entries.filter(e=> e.rcptKind && e.rcptKind!=="none" &&
    !(e.driveFiles||[]).some(f=>mainKinds.has(f.kind)) && !e.receiptPage && !e.taxPage && !(e.taxPdfs&&e.taxPdfs.length) && !(e.taxImgs&&e.taxImgs.length));
  // 2) ไฟล์ใบเสร็จบนชีตที่ไม่มีรายการไหนจับ (กำพร้า)
  const orphan=files.filter(f=> mainKinds.has(f.kind) && !claimed.has(f.fileId));
  let html="";
  html+=`<div style="margin:4px 0"><b>รายการที่ควรมีใบเสร็จแต่ยังว่าง:</b> ${missing.length}</div>`;
  if(missing.length) html+=missing.map(e=>`<div style="padding:4px 6px;border-bottom:1px solid #eee">• ${esc((e.desc||"").slice(0,40))} — ${fmtAmt(e.amount)} <span style="color:var(--muted)">[${esc(gsRowKey(e))}]</span></div>`).join("");
  html+=`<div style="margin:8px 0 4px"><b>ไฟล์ใบเสร็จบนชีตที่ไม่มีรายการจับ (กำพร้า):</b> ${orphan.length}</div>`;
  if(orphan.length) html+=orphan.map(f=>`<div style="padding:4px 6px;border-bottom:1px solid #eee">• ${esc(f.kind)} · ${esc((f.name||"").slice(0,32))} <span style="color:var(--muted)">[${esc(f.key)}]</span></div>`).join("");
  // 3) ลองจับคืน: ถ้าไฟล์กำพร้ามีคีย์ตรง variant ของรายการที่ยังว่าง -> ผูกให้
  let fixed=0;
  missing.forEach(e=>{
    const vs=gsRowKeyVariants(e);
    const hit=orphan.filter(f=> vs.has(f.key));
    if(hit.length){
      e.driveFiles=(e.driveFiles||[]).concat(hit);
      const dk=hit.map(f=>f.kind);
      if(e.rcptKind==="none"||!e.rcptKind){ e.rcptKind = dk.includes("receipt")?"receipt":"tax"; }
      fixed+=hit.length;
      hit.forEach(f=>claimed.add(f.fileId));
    }
  });
  if(fixed){ saveState(); renderAll(); html=`<div style="color:#0a8f5b;font-weight:600;margin-bottom:6px">✅ จับคืนได้ ${fixed} ไฟล์ — รีเฟรชแล้ว</div>`+html; }
  else html=`<div style="color:var(--muted);margin-bottom:6px">— ไม่พบไฟล์ที่จับคืนได้อัตโนมัติ —</div>`+html;
  box.innerHTML=html;
}

// ลบไฟล์ PDF — ลบออกจาก Google Drive ทันที (แม้ไฟล์จะถูกอัปจากเครื่องอื่น) สำหรับเปลี่ยนไฟล์ใหม่
async function deleteTaxPdf(r){
  if(!r) return;
  const onDrive=!!r.fileId;
  const msg = onDrive
    ? `ลบไฟล์ PDF นี้ และลบออกจาก Google Drive ทันที?\n\n${r.name||""}\n\n⚠️ ลบถาวร (แม้ไฟล์จะถูกอัปจากเครื่องอื่นก็ลบได้) — ใช้ตอนต้องการเปลี่ยนไฟล์ใหม่`
    : `ลบไฟล์ PDF นี้?\n\n${r.name||""}`;
  if(!confirm(msg)) return;
  const m=getActiveMonth(); const en=state.editingId && m && m.entries.find(x=>x.id===state.editingId);
  // 1) ลบจาก Drive ทันที
  if(onDrive){
    if(!gsReady()){ toast("⚠️ ยังไม่ได้เชื่อม Google — ลบจาก Drive ไม่ได้"); return; }
    await gsDeleteDriveFile(r.fileId, r.month||(m&&m.id), r.key||(en&&gsRowKey(en)), "taxpdf", r.name);
  }
  // 2) ลบ local copy เพื่อไม่ให้ถูกอัปกลับตอน Save
  state.taxPdfs=(state.taxPdfs||[]).filter(p=> p.name!==r.name);
  // 3) ลบออกจาก driveFiles ของ entry
  if(en){ en.driveFiles=(en.driveFiles||[]).filter(d=> !(d.kind==="taxpdf" && (r.fileId? d.fileId===r.fileId : d.name===r.name)) );
    saveState(); renderEntDrive(en); }
  renderTaxSection();
  toast(onDrive?"ลบไฟล์ PDF จาก Drive แล้ว ✓":"ลบไฟล์ PDF แล้ว ✓");
}
// (เดิม) ลบ PDF local อย่างเดียว — เก็บไว้เผื่อความเข้ากันได้
function removeTaxPdf(i){
  const removed=state.taxPdfs[i]; if(!removed) return;
  deleteTaxPdf({name:removed.name, fileId:(function(){ const m=getActiveMonth(); const en=state.editingId&&m&&m.entries.find(x=>x.id===state.editingId); const d=en&&(en.driveFiles||[]).find(x=>x.kind==="taxpdf"&&x.name===removed.name); return d?d.fileId:null; })(), key:null, month:null});
}
function setupTaxUpload(){
  const z=document.getElementById("taxUpzone"), inp=document.getElementById("taxFileIn");
  z.addEventListener("click",ev=>{ if(!ev.target.closest(".up-btn")) inp.click(); });
  inp.addEventListener("change",ev=>{ handleTaxFiles(ev.target.files); inp.value=""; });
  z.addEventListener("dragover",ev=>{ev.preventDefault();z.classList.add("drag-over");});
  z.addEventListener("dragleave",()=>z.classList.remove("drag-over"));
  z.addEventListener("drop",ev=>{ev.preventDefault();z.classList.remove("drag-over");handleTaxFiles(ev.dataTransfer.files);});
}
async function handleTaxFiles(files){
  const imgs=[]; const pdfs=[];
  for(const f of Array.from(files)){ if(f.type==="application/pdf") pdfs.push(f); else if(f.type.startsWith("image/")) imgs.push(f); }
  for(const f of pdfs){ await addTaxPdf(f); }
  if(imgs.length){ const loaded=await Promise.all(imgs.map(readCompressed));
    loaded.forEach((src,i)=>{ if(src) state.taxImgs.push({src,name:(imgs[i].name||`taximg_${Date.now()}_${i+1}.jpg`)}); });
  }

/* ---- robust image paste: clipboard files + <img> inserted by mobile long-press (MutationObserver) ---- */
function pasteTargetFor(boxId){
  if(boxId==="taxPaste")  return list=>{ if(list.length) openTaxBuilder(list); };
  if(boxId==="taxbPaste") return list=>{ if(!list.length) return; list.forEach(src=>taxB.imgs.push(makeImgObj(src,++_txseq,300,220,renderTaxb))); renderTaxb(); };
  if(boxId==="v6Paste")   return list=>{ if(!list.length) return; list.forEach(src=>v6.imgs.push(makeImgObj(src,++_v6seq,300,200,syncV6))); syncV6(); };
  return ()=>{};
}
function imgElsToDataUrls(imgs, cb){
  const srcs=Array.prototype.map.call(imgs,i=>i.src); const out=[]; let done=0;
  if(!srcs.length){ cb(out); return; }
  const fin=()=>{ if(++done===srcs.length) cb(out); };
  srcs.forEach(src=>{ const use=d=>compressImg(d,c=>{ out.push(c); fin(); });
    if(src.indexOf("data:")===0) use(src);
    else fetch(src).then(r=>r.blob()).then(b=>{const fr=new FileReader();fr.onload=e=>use(e.target.result);fr.readAsDataURL(b);}).catch(fin); });
}
function boxPaste(ev){
  const box=ev.currentTarget||ev.target; const cb=pasteTargetFor(box.id);
  const dt=ev.clipboardData; const files=[];
  if(dt){ if(dt.items) for(const it of dt.items){ if(it.kind==="file"&&(it.type||"").startsWith("image/")){ const f=it.getAsFile(); if(f) files.push(f); } }
    if(!files.length&&dt.files) for(const f of dt.files){ if((f.type||"").startsWith("image/")) files.push(f); } }
  if(files.length){ ev.preventDefault(); Promise.all(files.map(readCompressed)).then(cb); }
  // else: allow browser to insert image into the box; the observer below catches it
}
function watchPasteBox(boxId){
  const el=document.getElementById(boxId); if(!el||el._watched) return; el._watched=true;
  const cb=pasteTargetFor(boxId);
  const grab=()=>{ const imgs=el.querySelectorAll("img"); if(imgs.length){ el.innerHTML=""; imgElsToDataUrls(imgs, list=>{ if(list.length) cb(list); }); }
    else if((el.textContent||"").trim()===""){ if(el.innerHTML!=="") el.innerHTML=""; } };
  new MutationObserver(()=>setTimeout(grab,15)).observe(el,{childList:true,subtree:true});
}

/* ═══════ GENERIC STICKER ENGINE ═══════ */
function sheetScale(sheetEl){ const t=getComputedStyle(sheetEl).transform; if(t&&t!=="none"){ const m=t.match(/matrix\(([^)]+)\)/); if(m) return parseFloat(m[1].split(",")[0])||1; } return 1; }
function autoPlace(imgs){ imgs.forEach((im,i)=>{ if(im.x==null){ im.x=40+(i%2)*340; im.y=40+Math.floor(i/2)*240; if(im.w==null)im.w=300; if(im.h==null)im.h=220; } }); }
/* สร้าง object รูปพร้อมสัดส่วนจริง (ar) — กรอบเริ่มต้นถูกย่อให้พอดี โดยคงสัดส่วน ไม่ยืด/บีบ */
function makeImgObj(src, id, boxW, boxH, rerender){
  const o={ id, src, x:null, y:null, w:boxW, h:boxH, ar:null };
  const probe=new Image();
  probe.onload=()=>{
    const nw=probe.naturalWidth||1, nh=probe.naturalHeight||1;
    o.ar=nw/nh;
    let w=boxW, hh=w/o.ar;                    // ย่อตามความกว้างก่อน
    if(hh>boxH){ hh=boxH; w=hh*o.ar; }        // ถ้าสูงเกินกรอบ ย่อตามความสูงแทน
    o.w=Math.round(w); o.h=Math.round(hh);
    try{ if(typeof rerender==="function") rerender(); }catch(_){}
  };
  probe.src=src;
  return o;
}
/* สัดส่วนของรูป: ใช้ ar ที่เก็บไว้ ถ้าไม่มีให้อ่านจากขนาดจริงของ <img> ใน DOM */
function stickerAR(im, imgEl){
  if(im.ar && isFinite(im.ar) && im.ar>0) return im.ar;
  if(imgEl && imgEl.naturalWidth && imgEl.naturalHeight){ im.ar=imgEl.naturalWidth/imgEl.naturalHeight; return im.ar; }
  return (im.w && im.h) ? im.w/im.h : 1;
}
function stickerMarkup(im){ return `<div class="sticker" data-id="${im.id}" style="left:${im.x}px;top:${im.y}px;width:${im.w}px;height:${im.h}px">
  <div class="bar" data-drag="${im.id}"><span>รูป</span><span class="x" data-del="${im.id}">×</span></div>
  <img src="${im.src}" alt=""><div class="handle" data-res="${im.id}"></div></div>`; }
function renderZone(zoneEl, imgs, hint){ zoneEl.innerHTML=(imgs.length?"":`<div class="rcpt-hint">${esc(hint)}</div>`)+imgs.map(stickerMarkup).join(""); }
function bindZone(zoneEl, imgs, sheetEl, rerender){
  zoneEl.querySelectorAll(".sticker").forEach(st=>{
    const id=parseInt(st.dataset.id); const im=imgs.find(x=>x.id===id); if(!im) return;
    const bar=st.querySelector(".bar"), handle=st.querySelector(".handle"), del=st.querySelector(".x"), imgEl=st.querySelector("img");
    del.addEventListener("pointerdown",e=>e.stopPropagation());
    del.addEventListener("click",e=>{ e.stopPropagation(); const idx=imgs.findIndex(x=>x.id===id); if(idx>=0) imgs.splice(idx,1); rerender(); });
    drag(bar,(dx,dy)=>{ const s=sheetScale(sheetEl); im.x=Math.max(0,im.x+dx/s); im.y=Math.max(0,im.y+dy/s); st.style.left=im.x+"px"; st.style.top=im.y+"px"; });
    // ย่อ/ขยายแบบคงสัดส่วนเดิมของรูปเสมอ (ไม่ยืด ไม่บีบ) — ลากแกนไหนมากกว่า ใช้แกนนั้นนำ อีกแกนคำนวณตามสัดส่วน
    drag(handle,(dx,dy)=>{
      const s=sheetScale(sheetEl), r=stickerAR(im,imgEl);
      let w,hh;
      if(Math.abs(dx)>=Math.abs(dy)){ w=im.w+dx/s; hh=w/r; }
      else { hh=im.h+dy/s; w=hh*r; }
      if(w<40){ w=40; hh=w/r; }
      if(hh<30){ hh=30; w=hh*r; }
      im.w=Math.round(w); im.h=Math.round(hh);
      st.style.width=im.w+"px"; st.style.height=im.h+"px";
    });
  });
}
function drag(el,onMove){
  let on=false,lx=0,ly=0;
  el.addEventListener("pointerdown",e=>{ on=true; try{el.setPointerCapture(e.pointerId);}catch(_){ } lx=e.clientX; ly=e.clientY; e.preventDefault(); e.stopPropagation(); });
  el.addEventListener("pointermove",e=>{ if(!on) return; onMove(e.clientX-lx,e.clientY-ly); lx=e.clientX; ly=e.clientY; });
  el.addEventListener("pointerup",e=>{ on=false; try{el.releasePointerCapture(e.pointerId);}catch(_){ } });
  el.addEventListener("pointercancel",()=>on=false);
}
const _zoom={};
function fitScale(stageId, mode){
  const st=document.getElementById(stageId); if(!st) return 0.4;
  const rect=st.getBoundingClientRect();
  const aw=(st.clientWidth||rect.width)-28; const wf=aw/794;
  if(mode==="both"){
    let ah=(st.clientHeight||rect.height)-28; if(!ah||ah<80) ah=Math.round((window.innerHeight||800)*0.5);
    const sc=Math.min(wf, ah/1123);
    return Math.max(0.12, Math.min(1.5, sc));
  }
  return Math.max(0.12, Math.min(1, wf));
}
function applySheetZoom(sheetId){
  const sheet=document.getElementById(sheetId); if(!sheet) return; const sc=_zoom[sheetId]||0.4;
  sheet.style.transformOrigin="top center"; sheet.style.transform="scale("+sc+")";
  sheet.style.marginBottom=(1123*sc-1123)+"px";
  const mx=(794*sc-794)/2; sheet.style.marginLeft=mx+"px"; sheet.style.marginRight=mx+"px";
}
function scaleSheet(stageId,sheetId){
  const mode = sheetId==="taxbSheet" ? "both" : "width";
  _zoom[sheetId]=fitScale(stageId, mode); applySheetZoom(sheetId);
}
function fitSheetSoon(stageId,sheetId){
  const f=()=>scaleSheet(stageId,sheetId);
  requestAnimationFrame(()=>requestAnimationFrame(f)); setTimeout(f,140); setTimeout(f,400);
}
const ZOOM_STEP=0.8;                          // ปุ่ม − ย่อครั้งละ 0.8
const FIT_ZOOM_OUT=Math.pow(ZOOM_STEP,4);     // "พอดีจอ" = กด − 4 ครั้ง (≈0.41 เท่าของขนาดเต็มความกว้าง)
function zoomSheet(stageId,sheetId,how){
  const mode = sheetId==="taxbSheet" ? "both" : "width";
  const cur=_zoom[sheetId]||fitScale(stageId,mode);
  if(how==="fit") _zoom[sheetId]=Math.max(0.12, fitScale(stageId,mode)*FIT_ZOOM_OUT);
  else _zoom[sheetId]=Math.max(0.12, Math.min(2.2, cur*(how==="in"?1.25:ZOOM_STEP)));
  applySheetZoom(sheetId);
}

    <div class="a4-emp"><b>Employee's name</b><span class="ev">${esc(meta.emp||"")}</span></div>
    <div class="v6-dlbl">Description</div>
    <div class="v6-lines">${rows}</div>

    <div class="rcpt-zone">${meta.flowImg?`<img src="${meta.flowImg}" style="display:block;width:100%;height:auto">`:imgs}</div>`;

  document.body.appendChild(stage);
  const sheet=stage.firstElementChild;
  await Promise.all(Array.from(sheet.querySelectorAll("img")).map(im=> im.complete?Promise.resolve():new Promise(r=>{ im.onload=im.onerror=r; })));

// ดึงเฉพาะส่วน "รูปใบเสร็จ" ออกจากภาพรวมเดิม (composite ตาราง+รูป) โดยตัดส่วนฟอร์มตารางด้านบนทิ้ง
// คืน dataURL ของรูปที่ครอบเฉพาะเนื้อหาส่วนล่าง หรือ null ถ้าทำไม่ได้
function cropReceiptPhoto(srcUrl){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{
      try{
        const W=img.naturalWidth||img.width, H=img.naturalHeight||img.height;
        if(!W||!H){ resolve(null); return; }
        const c=document.createElement("canvas"); c.width=W; c.height=H;
        const ctx=c.getContext("2d"); ctx.drawImage(img,0,0,W,H);
        const all=ctx.getImageData(0,0,W,H).data;
        const isInk=(i)=> all[i]<210||all[i+1]<210||all[i+2]<210;   // ไม่ใช่ขาว
        // 1) หา "เส้นขอบล่างสุดของตาราง" = แถวที่มีหมึกลากจากขอบซ้ายสุดถึงขวาสุด (เส้นเต็มความกว้าง)
        let formEnd=0; const limit=Math.floor(H*0.72);
        for(let y=0;y<limit;y+=2){ let firstX=-1,lastX=-1,ink=0;
          for(let x=0;x<W;x+=3){ if(isInk((y*W+x)*4)){ if(firstX<0)firstX=x; lastX=x; ink++; } }
          if(firstX>=0 && firstX<W*0.13 && lastX>W*0.87 && ink>(W/3)*0.45) formEnd=y; }
        // เริ่มครอปใต้เส้นขอบตาราง + เผื่อข้ามคำว่า "Receipt"
        let startY = formEnd>0 ? Math.min(H-10, formEnd+48) : Math.floor(H*0.46);
        // 2) หา bounding box ของเนื้อหา (รูปใบเสร็จ) ที่อยู่ใต้ startY
        const rowH=H-startY; const region=ctx.getImageData(0,startY,W,rowH).data;
        let minX=W,minY=rowH,maxX=0,maxY=0,found=false; const S=2;
        for(let y=0;y<rowH;y+=S){ for(let x=0;x<W;x+=S){ const i=(y*W+x)*4;
          if(region[i]<236||region[i+1]<236||region[i+2]<236){ found=true;
            if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y; } } }
        if(!found){ resolve(null); return; }
        const pad=16;
        minX=Math.max(0,minX-pad); maxX=Math.min(W,maxX+pad);
        minY=Math.max(0,minY-pad); maxY=Math.min(rowH,maxY+pad);
        const cw=maxX-minX, ch=maxY-minY;
        if(cw<40||ch<40){ resolve(null); return; }   // เล็กเกินไป = ครอบไม่เจอรูป
        const oc=document.createElement("canvas"); oc.width=cw; oc.height=ch;
        oc.getContext("2d").drawImage(c, minX, startY+minY, cw, ch, 0,0, cw, ch);
        resolve(oc.toDataURL("image/jpeg",0.9));
      }catch(e){ console.error("cropReceiptPhoto",e); resolve(null); }
    };
    img.onerror=()=>resolve(null);
    img.src=srcUrl;
  });
}

let exportItems=[];
async function buildExportItems(m, opts){
  opts=opts||{};
  const items=[]; 
  const emit=async it=>{ items.push(it); if(opts.onItem){ try{ await opts.onItem(it); }catch(e){ console.error(e); } } };
  if(!opts.skipSummary) await emit({kind:"html", html:buildCabSheet(m), tag:""});
  for(let idx=0; idx<m.entries.length; idx++){
    const en=m.entries[idx]; const df=en.driveFiles||[];
    const fromDrive=(k,nm)=>{ const x=df.find(f=>f.kind===k && (!nm||f.name===nm)); return x?x.fileId:null; };
    const getSrc=async(local,k,nm)=>{ if(local) return local; const id=fromDrive(k,nm); if(id){ try{ return await gsFetchFile(id); }catch(e){ console.error(e); } } return null; };
    if(en.rcptKind==="receipt"){
      // สร้างใหม่จาก meta (เส้นจุดไข่ปลา); ถ้าในเครื่องไม่มี meta ลองดึงจาก Drive ก่อน
      let meta=en.receiptMeta;
      if(!meta){ const mf=df.find(f=>f.kind==="receiptmeta"); if(mf&&mf.fileId){ try{
        const durl=await gsFetchFile(mf.fileId); const j=durl.slice(durl.indexOf(",")+1);
        meta=JSON.parse(decodeURIComponent(escape(atob(j)))); en.receiptMeta=meta;
      }catch(e){ console.error("meta dl",e); } } }
      let oldComposite=null;
      if(!meta){   // ใบเสร็จเก่าที่มีแต่รูปตาราง ไม่มีข้อมูล -> สร้างฟอร์มเส้นไข่ปลาจากข้อมูลในแถว
        meta={ formType:FORM_TYPES[0], type:"", emp:EMP_SHORT, date:en.date||"",
          exps:[{desc:en.desc||"", amt:(en.amount!=null?String(en.amount):"")}], imgs:[] };
        // กู้เฉพาะ "รูปใบเสร็จ" จากภาพรวมเดิม มาใส่ในฟอร์ม -> ได้หน้าเดียว (ตัดตารางทิ้ง)
        oldComposite=await getSrc(en.receiptPage,"receipt");
        if(oldComposite){ try{ const cr=await cropReceiptPhoto(oldComposite); if(cr) meta.flowImg=cr; }catch(e){ console.error(e); } }
      }
      const metaHasPhoto = !!(meta && ((meta.imgs && meta.imgs.length) || meta.flowImg));
      let src=null;
      try{ src=await regenReceiptImage(meta); }catch(e){ console.error(e); }   // เส้นจุดไข่ปลาเสมอ
      if(!src) src=await getSrc(en.receiptPage,"receipt");   // last-resort เฉพาะตอนสร้างรูปไม่ได้ (ไลบรารีไม่โหลด)
      if(src) await emit({kind:"image", src, tag:`#${idx+1} ใบเสร็จ`});
      // กู้รูปไม่ได้ (crop ล้มเหลว) แต่มีรูปต้นฉบับ -> แนบเป็นหน้าถัดไป ไม่ให้หลักฐานหาย
      if(!metaHasPhoto && oldComposite && oldComposite!==src){
        await emit({kind:"image", src:oldComposite, tag:`#${idx+1} รูปใบเสร็จแนบ (ต้นฉบับ)`});
      }
    } else if(en.rcptKind==="tax"){
      const timg=await getSrc(en.taxPage,"tax"); if(timg) await emit({kind:"image", src:timg, tag:`#${idx+1} ใบกำกับภาษี (รูป)`});
      // รูปภาพหลายรูป — 1 รูป/หน้า A4
      const imgs=en.taxImgs||[];
      const driveImgNames=new Set(imgs.map(p=>p.name));
      for(let ii=0; ii<imgs.length; ii++){ const p=imgs[ii]; const isrc=await getSrc(p.src,"taximg",p.name);
        if(isrc) await emit({kind:"image", src:isrc, tag:`#${idx+1} ใบกำกับภาษี (รูป ${ii+1})`}); }
      // รูปที่อยู่บน Drive เท่านั้น (อัปจากเครื่องอื่น ยังไม่มีในเครื่อง)
      const driveOnlyImgs=df.filter(f=>f.kind==="taximg" && !driveImgNames.has(f.name));
      for(let di=0; di<driveOnlyImgs.length; di++){ const f=driveOnlyImgs[di];
        try{ const isrc=await gsFetchFile(f.fileId); if(isrc) await emit({kind:"image", src:isrc, tag:`#${idx+1} ใบกำกับภาษี (รูป Drive)`}); }catch(e){ console.error(e); } }
      const pdfs=en.taxPdfs||[];
      for(const p of pdfs){ const psrc=await getSrc(p.src,"taxpdf",p.name); if(psrc) await emit({kind:"pdf", src:psrc, name:p.name, rendered:[], tag:`#${idx+1} ใบกำกับภาษี (PDF)`}); }
    }
  }
  return items;
}
const _rasterCache=new Map();
async function rasterizePdf(dataUrl, scale=1.6){
  if(!window.pdfjsLib) return [];
  const _rk=dataUrl.length+"|"+dataUrl.slice(40,120)+"|"+scale;
  if(_rasterCache.has(_rk)) return _rasterCache.get(_rk);
  try{
    pdfjsLib.GlobalWorkerOptions.workerSrc=PDFJS_WORKER;
    const pdf=await pdfjsLib.getDocument({data:dataUrlToU8(dataUrl)}).promise; const out=[];
    for(let i=1;i<=pdf.numPages;i++){ const page=await pdf.getPage(i); const vp=page.getViewport({scale});
      const c=document.createElement("canvas"); c.width=vp.width; c.height=vp.height;
      await page.render({canvasContext:c.getContext("2d"),viewport:vp}).promise; out.push(c.toDataURL("image/jpeg",0.85)); }
    _rasterCache.set(_rk,out);
    return out;
  }catch(e){ console.error("raster pdf",e); return []; }
}

      return true;                                          // ยังไม่เคยถึงชีต (เพิ่งลบ/ออฟไลน์) เก็บไว้ก่อน
    });
    const months=(data.months||[]).map(buildMonthFromServer);

    const serverIds=new Set(months.map(m=>m.id));

    _lastSync=new Date(); cbDotState("on");
    state.transfers=(data.transfers||[]);   // เช็คลิสต์โอนเงินจากชีต _transfers
    updateTransferBadge();
    if(showToast) toast(`✓ ดึงจาก Google Sheet แล้ว (${months.length} เดือน)`);
    if(showToast) setTimeout(scanLatestMonthDates, 350);   // ตรวจวันที่เดือนล่าสุดเมื่อกด refresh เอง
  }catch(e){ console.error(e); cbDotState("err"); if(showToast) toast("⚠️ ดึงไม่สำเร็จ: "+(e.message||e)); }

function gsRowKey(e){ return e&&e.id ? "S"+String(e.id) : gsRowKeyLegacy(e); }   // คีย์ไฟล์คงที่ต่อรายการ — แก้ Ref/ราคาแล้วไฟล์ไม่หลุด
function gsRowKeyLegacy(e){ const d=String(e.refInv==null?"":e.refInv).replace(/[^0-9]/g,""); const amt=Math.round((parseFloat(e.amount)||0)*100); if(d) return "R"+d.slice(-4)+"_"+amt; return "AC"+amt+"|"+String(e.customer||"").trim().toLowerCase(); }
// คีย์เดิม (ก่อนเพิ่มจำนวนเงิน) — ใช้จับไฟล์เก่าที่อัปด้วยคีย์เดิมเท่านั้น
function gsRowKeyOld(e){ const d=String(e.refInv==null?"":e.refInv).replace(/[^0-9]/g,""); if(d) return "R"+d.slice(-4); const amt=Math.round((parseFloat(e.amount)||0)*100); return "AC"+amt+"|"+String(e.customer||"").trim().toLowerCase(); }
// คีย์เพิ่มเติมสำหรับ "จับไฟล์กำพร้า": ปัญหาเลข 0 นำหน้า refInv (738 vs 0738) ทำให้ 4 ตัวท้ายต่างกัน
// -> รวมทุกแบบที่เป็นไปได้ของรายการนี้ ไว้ค้นไฟล์บนชีตแบบยืดหยุ่น
function gsRowKeyVariants(e){
  const set=new Set();
  const raw=String(e.refInv==null?"":e.refInv).replace(/[^0-9]/g,"");
  const amt=Math.round((parseFloat(e.amount)||0)*100);
  const cust=String(e.customer||"").trim().toLowerCase();
  if(e&&e.id) set.add("S"+String(e.id));
  if(raw){
    const noZero=raw.replace(/^0+/,"")||raw;         // ตัด 0 นำหน้า
    [raw, noZero].forEach(d=>{
      const last4=d.slice(-4);
      set.add("R"+last4+"_"+amt);                    // คีย์ ref+ราคา
      set.add("R"+last4);                            // คีย์ ref เดิม
      // เผื่อ pad 0 เป็น 4 หลัก
      const pad4=("0000"+d).slice(-4);
      set.add("R"+pad4+"_"+amt); set.add("R"+pad4);
    });
  }
  set.add("AC"+amt+"|"+cust);
  return set;
}
async function gsUploadMonth(silent){

    if(e.taxPage && !alreadyUp(e,"tax",`tax_${key}.jpg`)) jobs.push({entryId:e.id,key,kind:"tax",name:`tax_${key}.jpg`,mime:"image/jpeg"});

    (e.taxImgs||[]).forEach((p,i)=>{ if(p&&p.src){ const nm=(p.name||`taximg_${key}_${i+1}.jpg`); if(!alreadyUp(e,"taximg",nm,String(p.src.length))) jobs.push({entryId:e.id,key,kind:"taximg",name:nm,mime:"image/jpeg"}); } });
  });
  if(!jobs.length){ if(!silent) toast("✓ ไฟล์ทั้งหมดอัปขึ้น Drive แล้ว — ไม่มีไฟล์ใหม่"); return; }
  if(!silent && !confirm(`อัป ${jobs.length} ไฟล์ใหม่ ของเดือน "${m.label}" ขึ้น Drive\n(ไฟล์ที่อัปแล้วจะถูกข้าม)\nยืนยันหรือไม่?`)) return;

  updateCloudUI();
}

/* ── คิวอัปโหลดถาวร: ปิดแอปกลางคัน -> เปิดมาอัปต่อให้จนเสร็จ ──
